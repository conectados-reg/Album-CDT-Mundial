<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum Estrellas - Panel de Administración</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0b1329;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }
    header {
      background-color: #1c2541;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ffcc00;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    header h1 {
      margin: 0;
      font-size: 24px;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .admin-badge {
      background: #ffaa00;
      color: #0b1329;
      padding: 5px 10px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 12px;
      margin-left: 10px;
    }
    .btn-logout {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover {
      background: #dc2626;
    }
    .container {
      max-width: 1300px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .welcome-card {
      background: #1c2541;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #3a506b;
      margin-bottom: 30px;
    }
    .welcome-card h2 {
      margin-top: 0;
      color: #ffcc00;
    }
    .table-container {
      background: #1c2541;
      border-radius: 10px;
      border: 1px solid #3a506b;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .table-header {
      background: #3a506b;
      padding: 15px 20px;
      font-weight: bold;
      font-size: 18px;
      color: #ffcc00;
      border-bottom: 1px solid #5c7494;
    }
    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      min-width: 900px;
    }
    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #3a506b;
      font-size: 14px;
    }
    th {
      background-color: #161e35;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    tr:hover {
      background-color: #232f52;
    }
    .txt-clave {
      color: #ffcc00;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      background: #0b1329;
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #3a506b;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }
    .status-activa { background: #10b981; color: #064e3b; }
