<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum Estrellas — Panel Admin</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --p-navy:   #001f5e;
      --p-blue:   #0046AD;
      --p-orange: #F7A800;
      --p-red:    #E8231A;
      --p-green:  #00c853;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #010a1e 0%, #021233 60%, #010c24 100%);
      min-height: 100vh; font-family: 'Barlow', sans-serif; color: #fff;
    }

    /* ── NAVBAR ── */
    header {
      position: sticky; top: 0; z-index: 500;
      background: linear-gradient(90deg, #000d2e 0%, #001a55 50%, #000d2e 100%);
      border-bottom: 3px solid var(--p-orange);
      box-shadow: 0 4px 24px rgba(0,0,0,.6);
      padding: .65rem 1.5rem;
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    }
    .header-brand { display: flex; align-items: center; gap: .6rem; flex: 1; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .12em; color: #fff; line-height: 1; }
    .header-title span { color: var(--p-orange); }
    .header-sub { font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.35); margin-top: .15rem; }
    .btn-logout {
      font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
      background: rgba(232,35,26,.12); color: #ff6b6b; border: 1.5px solid rgba(232,35,26,.4);
      border-radius: 20px; padding: .35rem 1rem; cursor: pointer; transition: all .2s;
    }
    .btn-logout:hover { background: var(--p-red); color: #fff; border-color: var(--p-red); box-shadow: 0 0 16px rgba(232,35,26,.4); }

    /* ── TABS ── */
    .tabs-bar {
      background: rgba(0,10,35,.6); border-bottom: 1px solid rgba(255,255,255,.07);
      display: flex; gap: .25rem; padding: .6rem 1.5rem 0;
      position: sticky; top: 64px; z-index: 400; overflow-x: auto;
    }
    .tab-btn {
      font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      background: transparent; color: rgba(255,255,255,.4); border: none;
      border-bottom: 3px solid transparent; padding: .55rem 1.1rem;
      cursor: pointer; white-space: nowrap; transition: all .2s;
    }
    .tab-btn:hover { color: rgba(255,255,255,.75); }
    .tab-btn.active { color: var(--p-orange); border-bottom-color: var(--p-orange); }

    /* ── CONTAINER ── */
    .container { max-width: 1300px; margin: 2rem auto; padding: 0 1.5rem 4rem; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── INFO CARD ── */
    .info-card {
      background: linear-gradient(135deg, rgba(0,70,173,.15), rgba(0,30,90,.2));
      border: 1.5px solid rgba(247,168,0,.2); border-radius: 14px;
      padding: 1.2rem 1.5rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      position: relative; overflow: hidden;
    }
    .info-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--p-orange), transparent); }
    .info-card-icon { font-size: 2rem; flex-shrink: 0; filter: drop-shadow(0 0 8px rgba(247,168,0,.4)); }
    .info-card-text h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: .08em; color: var(--p-orange); margin-bottom: .2rem; }
    .info-card-text p { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; letter-spacing: .04em; color: rgba(255,255,255,.4); }

    /* ── TABLE CARD ── */
    .table-card {
      background: linear-gradient(160deg, #0d1e4a 0%, #091535 100%);
      border: 1.5px solid rgba(255,255,255,.07); border-radius: 14px;
      overflow: hidden; margin-bottom: 1.5rem;
    }
    .table-card-header {
      padding: .9rem 1.4rem; background: rgba(0,30,80,.4);
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; gap: .8rem; flex-wrap: wrap;
    }
    .table-card-header h3 { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .1em; color: #fff; flex: 1; }
    .table-count {
      font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      background: rgba(247,168,0,.12); color: var(--p-orange);
      border: 1px solid rgba(247,168,0,.25); border-radius: 20px; padding: .18rem .7rem;
    }
    .table-wrapper { overflow-x: auto; }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    thead tr { background: rgba(0,0,0,.3); }
    th {
      font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.4);
      padding: .65rem 1rem; text-align: left; white-space: nowrap;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    td {
      padding: .6rem 1rem; border-bottom: 1px solid rgba(255,255,255,.04);
      vertical-align: middle; color: rgba(255,255,255,.85); white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }

    .td-nombre strong { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700; color: #fff; }
    .td-codigo { font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; color: rgba(255,255,255,.3); letter-spacing: .05em; }
    .td-email  { font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; color: rgba(255,255,255,.5); max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .txt-clave {
      font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 700; letter-spacing: .06em;
      color: var(--p-orange); background: rgba(247,168,0,.1); border: 1px solid rgba(247,168,0,.2);
      border-radius: 6px; padding: .2rem .55rem;
    }
    .td-empleados { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--p-orange); text-align: center; }
    .badge-activa {
      display: inline-flex; align-items: center; gap: .3rem;
      font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      background: rgba(0,200,83,.12); color: #00c853; border: 1px solid rgba(0,200,83,.3);
      border-radius: 20px; padding: .2rem .65rem;
    }
    .badge-activa::before { content: ''; width: 5px; height: 5px; background: #00c853; border-radius: 50%; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* ── COUNTRY SECTION HEADER ── */
    .pais-header td {
      background: rgba(0,20,60,.6) !important;
      border-bottom: 1px solid rgba(247,168,0,.15) !important;
      border-top: 1px solid rgba(247,168,0,.12);
      padding: .55rem 1rem;
    }
    .pais-label {
      font-family: 'Bebas Neue', sans-serif; font-size: .95rem; letter-spacing: .12em;
      color: var(--p-orange); display: flex; align-items: center; gap: .5rem;
    }
    .pais-count {
      font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: .1em; color: rgba(255,255,255,.35); margin-left: auto; padding-right: .5rem;
    }

    /* ── STORE ROW (expandable) ── */
    .row-tienda { cursor: pointer; transition: background .15s; }
    .row-tienda:hover td { background: rgba(0,70,173,.1) !important; }
    .row-tienda td:first-child { padding-left: 1.8rem; }
    .row-tienda td:first-child::before {
      content: '▶';
      font-size: .55rem; color: rgba(255,255,255,.25);
      display: inline-block; transition: transform .2s;
      margin-right: .5rem; vertical-align: middle;
    }
    .row-tienda.expanded td:first-child::before { transform: rotate(90deg); color: var(--p-orange); }

    /* ── EMPLOYEE EXPANSION ROW ── */
    .row-empleados td {
      background: rgba(0,0,0,.2) !important;
      padding: 0 !important;
      border-bottom: 2px solid rgba(247,168,0,.08) !important;
    }
    .emp-panel { padding: .8rem 1.8rem 1rem; }
    .emp-summary {
      display: flex; align-items: center; gap: .8rem; margin-bottom: .7rem;
      font-family: 'Barlow Condensed', sans-serif; font-size: .75rem;
      letter-spacing: .06em; color: rgba(255,255,255,.4);
    }
    .emp-summary-count {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
      color: var(--p-green); letter-spacing: .05em;
    }
    .emp-summary-total { color: rgba(255,255,255,.3); font-size: .8rem; }
    .emp-grid { display: flex; flex-wrap: wrap; gap: .4rem; }
    .emp-chip {
      display: inline-flex; align-items: center; gap: .35rem;
      font-family: 'Barlow Condensed', sans-serif; font-size: .78rem;
      background: rgba(0,70,173,.18); border: 1px solid rgba(0,70,173,.3);
      border-radius: 20px; padding: .3rem .75rem; color: rgba(255,255,255,.75);
      transition: background .15s;
    }
    .emp-chip.ok {
      background: rgba(0,200,83,.1); border-color: rgba(0,200,83,.3); color: #69f0ae;
    }
    .emp-chip .chip-cargo { font-size: .68rem; color: rgba(255,255,255,.3); }
    .emp-chip.ok .chip-cargo { color: rgba(0,200,83,.5); }
    .badge-100 {
      font-family: 'Bebas Neue', sans-serif; font-size: .7rem; letter-spacing: .05em;
      background: var(--p-green); color: #000; border-radius: 10px;
      padding: .05rem .35rem;
    }
    .emp-loading { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; color: rgba(255,255,255,.3); padding: .5rem 0; }

    /* ── WEEK SELECTOR ── */
    .week-selector { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .week-btn {
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .08em;
      background: rgba(255,255,255,.06); color: rgba(255,255,255,.5);
      border: 1.5px solid rgba(255,255,255,.1); border-radius: 10px;
      padding: .5rem 1.1rem; cursor: pointer; transition: all .2s; min-width: 72px; text-align: center;
    }
    .week-btn:hover { background: rgba(247,168,0,.1); color: var(--p-orange); border-color: rgba(247,168,0,.3); }
    .week-btn.active { background: rgba(247,168,0,.18); color: var(--p-orange); border-color: var(--p-orange); box-shadow: 0 0 16px rgba(247,168,0,.2); }
    .week-btn.es-activa { border-color: rgba(0,200,83,.4); }
    .week-info { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; color: rgba(255,255,255,.3); margin-bottom: 1rem; letter-spacing: .05em; }

    /* ── PERFORMANCE TABLE ── */
    .pct-bar-wrap { width: 90px; height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: .4rem; }
    .pct-bar { height: 100%; border-radius: 3px; background: var(--p-green); transition: width .4s; }
    .td-pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; white-space: nowrap; }
    .td-pct.full { color: var(--p-green); }
    .td-pct.partial { color: var(--p-orange); }
    .td-pct.none { color: rgba(255,255,255,.3); }

    /* ── NOTIFICATION CARDS ── */
    .notif-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 1rem; }
    .notif-card { background: linear-gradient(160deg, #0d1e4a, #091535); border: 1.5px solid rgba(255,255,255,.07); border-radius: 14px; overflow: hidden; transition: border-color .2s; }
    .notif-card:hover { border-color: rgba(247,168,0,.3); }
    .notif-card-head { padding: .85rem 1.1rem; background: rgba(0,30,80,.4); border-bottom: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; gap: .6rem; }
    .notif-card-head h4 { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; font-weight: 700; color: #fff; flex: 1; }
    .notif-card-head .count-badge { font-family: 'Bebas Neue', sans-serif; font-size: .95rem; background: rgba(0,200,83,.15); color: var(--p-green); border: 1px solid rgba(0,200,83,.3); border-radius: 20px; padding: .1rem .55rem; }
    .notif-card-body { padding: .7rem 1.1rem; }
    .notif-emp-list { list-style: none; margin-bottom: .8rem; }
    .notif-emp-list li { font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; color: rgba(255,255,255,.6); padding: .18rem 0; border-bottom: 1px solid rgba(255,255,255,.04); display: flex; gap: .5rem; }
    .notif-emp-list li strong { color: rgba(255,255,255,.85); }
    .notif-email { font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; color: rgba(255,255,255,.3); margin-bottom: .8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-send {
      width: 100%; font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      background: linear-gradient(90deg, #F7A800, #e09500); color: #000;
      border: none; border-radius: 8px; padding: .6rem 1rem; cursor: pointer; transition: all .2s;
    }
    .btn-send:hover { filter: brightness(1.1); box-shadow: 0 4px 16px rgba(247,168,0,.35); }
    .btn-send:disabled { background: rgba(255,255,255,.08); color: rgba(255,255,255,.2); cursor: not-allowed; filter: none; box-shadow: none; }
    .btn-send.sent { background: linear-gradient(90deg, #00c853, #00a844); color: #fff; }

    /* ── STATE MESSAGES ── */
    .state-msg { text-align: center; padding: 3rem 1rem; font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .08em; color: rgba(255,255,255,.3); }
    .state-msg .spin { display: inline-block; font-size: 1.5rem; animation: spin 1.2s linear infinite; margin-bottom: .5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a2f60; color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-size: .85rem; letter-spacing: .05em;
      padding: .7rem 1.4rem; border-radius: 30px;
      border: 1px solid rgba(255,255,255,.12); box-shadow: 0 8px 32px rgba(0,0,0,.5);
      z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1); white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) {
      header { padding: .5rem 1rem; }
      .info-card { flex-direction: column; align-items: flex-start; }
      .container { padding: 0 1rem 3rem; }
      .notif-grid { grid-template-columns: 1fr; }
      .tabs-bar { padding: .6rem 1rem 0; }
    }
    .admin-search-wrap { position: relative; max-width: 380px; margin-bottom: 1rem; }
    .admin-search-wrap .s-icon { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.35); pointer-events: none; }
    .admin-search-input {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem;
      letter-spacing: .03em;
      padding: .6rem 1rem .6rem 2.5rem;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .admin-search-input:focus { border-color: var(--p-orange); background: rgba(247,168,0,.06); box-shadow: 0 0 0 3px rgba(247,168,0,.1); }
    .admin-search-input::placeholder { color: rgba(255,255,255,.25); }

    /* ── ACCORDION PAÍS ── */
    .pais-acc-btn {
      width: 100%; text-align: left;
      background: rgba(0,20,60,.6); border: none;
      border-top: 1px solid rgba(247,168,0,.12);
      border-bottom: 1px solid rgba(247,168,0,.15);
      padding: .75rem 1.2rem; cursor: pointer;
      display: flex; align-items: center; gap: .6rem;
      font-family: 'Bebas Neue', sans-serif; font-size: .95rem;
      letter-spacing: .12em; color: var(--p-orange);
      transition: background .15s;
    }
    .pais-acc-btn:hover { background: rgba(0,30,80,.8); }
    .pais-acc-btn .acc-arrow { margin-left: auto; font-size: .65rem; transition: transform .2s; color: rgba(255,255,255,.25); }
    .pais-acc-btn.open .acc-arrow { transform: rotate(90deg); color: var(--p-orange); }
    .pais-acc-stores { display: none; }
    .pais-acc-btn.open + .pais-acc-stores { display: block; }

    /* ── STORE ACCORDION BUTTON ── */
    .store-acc-btn {
      width: 100%; text-align: left;
      background: rgba(0,10,35,.5); border: none;
      border-bottom: 1px solid rgba(255,255,255,.04);
      padding: .62rem 1.2rem .62rem 2.8rem; cursor: pointer;
      display: flex; align-items: center; gap: .6rem;
      font-family: 'Barlow Condensed', sans-serif; font-size: .9rem;
      font-weight: 600; letter-spacing: .03em; color: rgba(255,255,255,.72);
      transition: background .15s;
    }
    .store-acc-btn:hover { background: rgba(0,70,173,.14); color: #fff; }
    .store-acc-btn .acc-arrow { font-size: .55rem; color: rgba(255,255,255,.2); transition: transform .2s; margin-left: auto; }
    .store-acc-btn.open .acc-arrow { transform: rotate(90deg); color: var(--p-orange); }
    .store-acc-panel { display: none; padding: .9rem 1.4rem .9rem 3rem; background: rgba(0,0,0,.22); border-bottom: 2px solid rgba(247,168,0,.08); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <div class="header-brand">
      <img src="https://i.postimg.cc/hv6YBVfc/logo-sla.png" alt="SLA Corp"
        style="height:36px;width:auto;filter:drop-shadow(0 0 8px rgba(247,168,0,.5));"
        onerror="this.outerHTML='<span style=\'font-size:1.5rem;\'>📊</span>'">
      <div>
        <div class="header-title">PANEL <span>ADMIN</span></div>
        <div class="header-sub">Álbum Estrellas · SLA Corp</div>
      </div>
    </div>
    <button class="btn-logout" id="btnLogout">✕ Cerrar Sesión</button>
  </header>

  <!-- TABS BAR -->
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="sucursales"><i class="fa-solid fa-store"></i> Sucursales</button>
  </div>

  <div class="container">

    <!-- ══════════════════════ TAB 1: SUCURSALES ══════════════════════ -->
    <div class="tab-panel active" id="tab-sucursales">
      <div class="info-card">
        <span class="info-card-icon"><i class="fa-solid fa-store"></i></span>
        <div class="info-card-text">
          <h2>Tiendas por País</h2>
          <p>Haz clic en un país para expandirlo, y en cada tienda para ver el resumen de fichas por semana.</p>
        </div>
      </div>

      <div class="admin-search-wrap">
        <span class="s-icon">🔍</span>
        <input type="text" id="searchSucursal" class="admin-search-input" placeholder="Buscar sucursal o región…" autocomplete="off">
      </div>
      <div class="table-card">
        <div class="table-card-header">
          <h3><i class="fa-solid fa-globe" style="color:var(--p-orange);margin-right:.4rem;font-size:.9rem;"></i>Tiendas por País</h3>
          <span class="table-count" id="badge-count">Cargando...</span>
        </div>
        <div id="loadingState" class="state-msg">
          <i class="fa-solid fa-circle-notch fa-spin" style="font-size:1.4rem;color:var(--p-orange);"></i><br>Cargando directorio SLA Corp...
        </div>
        <div id="acordeonTiendas" style="display:none;"></div>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    const API_URL = 'https://album-cdt-mundial.onrender.com/api';
    const token   = localStorage.getItem('token');
    const esAdmin = localStorage.getItem('esAdmin');

    if (!token || esAdmin !== 'true') { localStorage.clear(); window.location.href = 'index.html'; }

    document.getElementById('btnLogout').onclick = async () => { await firebase.auth().signOut(); localStorage.clear(); window.location.href = 'index.html'; };

    /* ── TOAST ── */
    function showToast(msg, ms = 2800) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms);
    }

    /* ── TABS ── */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    /* ══════════════════════════════════════════════════════════
       TAB 1 — SUCURSALES (agrupadas por país)
    ══════════════════════════════════════════════════════════ */
    const empCache = {};

    function banderaPais(region) {
      const r = (region || '').toLowerCase();
      const mapa = [
        ['panam',  'pa'], ['colom', 'co'], ['costa',  'cr'],
        ['guatem', 'gt'], ['domini','do'], ['hondur', 'hn'],
        ['salvad', 'sv'], ['nicara','ni'],
      ];
      for (const [key, code] of mapa) {
        if (r.includes(key))
          return `<img src="https://flagcdn.com/20x15/${code}.png" alt="${code}" style="width:20px;height:15px;border-radius:2px;vertical-align:middle;margin-right:6px;box-shadow:0 1px 3px rgba(0,0,0,.4);">`;
      }
      return '<i class="fa-solid fa-earth-americas" style="margin-right:6px;color:rgba(255,255,255,.4);font-size:.85rem;vertical-align:middle;"></i>';
    }

    let _todasTiendas = [];

    function renderTablaTiendas(tiendas) {
      const wrap = document.getElementById('acordeonTiendas');
      if (!tiendas.length) {
        wrap.innerHTML = '<div class="state-msg">No se encontraron sucursales.</div>';
        document.getElementById('badge-count').textContent = '0 sucursales';
        return;
      }
      const grupos = {};
      tiendas.forEach(t => {
        const k = t.region || 'General';
        if (!grupos[k]) grupos[k] = [];
        grupos[k].push(t);
      });
      let total = 0, html = '';
      Object.entries(grupos).forEach(([pais, lista]) => {
        total += lista.length;
        html += `
          <button class="pais-acc-btn" onclick="this.classList.toggle('open')">
            ${banderaPais(pais)} ${pais.toUpperCase()}
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;color:rgba(255,255,255,.35);margin-left:.4rem;">${lista.length} sucursal${lista.length!==1?'es':''}</span>
            <span class="acc-arrow">▶</span>
          </button>
          <div class="pais-acc-stores">
            ${lista.map(t => `
              <button class="store-acc-btn" id="store-btn-${t.id}" onclick="toggleStoreAcc('${t.id}')">
                <i class="fa-solid fa-store" style="color:var(--p-orange);font-size:.8rem;margin-right:4px;"></i>
                <span style="font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:var(--p-orange);margin-right:4px;letter-spacing:.04em;">${t.codigo||''}</span>${t.nombre}
                <span class="acc-arrow">▶</span>
              </button>
              <div class="store-acc-panel" id="store-acc-${t.id}" style="display:none;">
                <span class="emp-loading">Cargando personal...</span>
              </div>`).join('')}
          </div>`;
      });
      wrap.innerHTML = html;
      document.getElementById('badge-count').textContent = `${total} sucursales`;
    }

    document.getElementById('searchSucursal').addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      renderTablaTiendas(q
        ? _todasTiendas.filter(t => t.nombre.toLowerCase().includes(q) || (t.region || '').toLowerCase().includes(q) || (t.codigo || '').toLowerCase().includes(q))
        : _todasTiendas
      );
    });

    async function cargarTiendasAdmin() {
      try {
        const res  = await fetch(`${API_URL}/tiendas/`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();

        if (!res.ok) { document.getElementById('loadingState').innerHTML = '❌ Error al leer datos del servidor.'; return; }

        _todasTiendas = data.tiendas || [];
        renderTablaTiendas(_todasTiendas);

        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('acordeonTiendas').style.display = 'block';

      } catch (err) {
        console.error(err);
        document.getElementById('loadingState').innerHTML = '❌ Error de conexión. Refresca la página.';
      }
    }

    async function toggleStoreAcc(tiendaId) {
      const btn   = document.getElementById(`store-btn-${tiendaId}`);
      const panel = document.getElementById(`store-acc-${tiendaId}`);
      const isOpen = panel.style.display === 'block';

      if (isOpen) {
        panel.style.display = 'none';
        if (btn) btn.classList.remove('open');
        return;
      }

      panel.style.display = 'block';
      if (btn) btn.classList.add('open');

      if (empCache[tiendaId]) {
        renderFichasSemana(tiendaId, empCache[tiendaId]);
        return;
      }

      try {
        const res  = await fetch(`${API_URL}/album/admin/${tiendaId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        empCache[tiendaId] = data;
        renderFichasSemana(tiendaId, data);
      } catch {
        document.getElementById(`store-acc-${tiendaId}`).innerHTML = '<span class="emp-loading">❌ Error al cargar fichas.</span>';
      }
    }

    function renderFichasSemana(tiendaId, data) {
      const panel   = document.getElementById(`store-acc-${tiendaId}`);
      const semanas = data.semanas || [];

      if (!semanas.length) {
        panel.innerHTML = '<span class="emp-loading">Sin fichas registradas para esta tienda.</span>';
        return;
      }

      const rows = semanas.map(s => {
        const pct      = s.porcentaje;
        const pctStr   = pct != null ? Math.round(pct) + '%' : '—';
        const pctOk    = pct != null && pct >= 100;
        const pctColor = pctOk ? 'var(--p-green)' : (pct != null && pct > 0 ? 'var(--p-orange)' : 'rgba(255,255,255,.3)');
        const fotosBadge = s.con_foto ? `<span style="font-family:'Barlow Condensed',sans-serif;font-size:.68rem;color:rgba(247,168,0,.6);">📷 ${s.con_foto}</span>` : '';
        return `<div style="display:flex;align-items:center;gap:.8rem;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.04);">
          <span style="font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:var(--p-orange);min-width:50px;">S${s.semana_numero}</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:rgba(255,255,255,.5);flex:1;">${s.semana_nombre || 'Semana ' + s.semana_numero}</span>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:${pctColor};">${pctStr}</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:rgba(255,255,255,.3);">${s.desbloqueadas}/${s.total} fichas</span>
          ${fotosBadge}
        </div>`;
      }).join('');

      panel.innerHTML = `<div style="padding:.3rem 0;">${rows}</div>`;
    }

    /* ── INIT ── */
    window.onload = () => { cargarTiendasAdmin(); };
  </script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-init.js"></script>
</body>
