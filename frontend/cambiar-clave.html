<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum Estrellas — Cambiar Contraseña</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/hv6YBVfc/logo-sla.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --p-navy:   #001f5e;
      --p-blue:   #0046AD;
      --p-orange: #F7A800;
      --p-red:    #E8231A;
      --p-green:  #00c853;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #010a1e 0%, #021233 60%, #010c24 100%);
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -30%; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(0,70,173,.18) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%; left: 50%;
      transform: translateX(-50%);
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(247,168,0,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      text-align: center;
      margin-bottom: 1.8rem;
      position: relative;
      z-index: 1;
    }
    .badge-icon {
      font-size: 3rem;
      display: block;
      filter: drop-shadow(0 0 16px rgba(247,168,0,.5));
      margin-bottom: .5rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 12px rgba(247,168,0,.4)); }
      50%      { filter: drop-shadow(0 0 24px rgba(247,168,0,.8)); }
    }
    .badge-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: .15em;
      color: #fff;
      line-height: 1;
    }
    .badge-title span { color: var(--p-orange); }
    .badge-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      margin-top: .3rem;
    }

    .card {
      background: linear-gradient(160deg, #0d1e4a 0%, #091535 100%);
      border: 1.5px solid rgba(247,168,0,.2);
      border-radius: 18px;
      padding: 2rem 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--p-orange), transparent);
      border-radius: 0 0 3px 3px;
    }

    .store-banner {
      background: rgba(0,70,173,.15);
      border: 1px solid rgba(0,70,173,.35);
      border-radius: 10px;
      padding: .6rem 1rem;
      margin-bottom: 1.4rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .78rem;
      letter-spacing: .06em;
      color: rgba(255,255,255,.5);
      text-align: center;
    }
    .store-banner strong { color: #fff; font-size: .85rem; display: block; margin-top: .15rem; }

    .alert {
      display: none;
      border-radius: 8px;
      padding: .65rem .9rem;
      margin-bottom: 1.2rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .82rem;
      letter-spacing: .04em;
    }
    .alert-error {
      background: rgba(232,35,26,.1);
      border: 1px solid rgba(232,35,26,.4);
      color: #ff8080;
    }
    .alert-success {
      background: rgba(0,200,83,.1);
      border: 1px solid rgba(0,200,83,.35);
      color: #69f0ae;
    }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-bottom: .45rem;
    }
    .input-wrap { position: relative; }
    .form-group input[type="password"],
    .form-group input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px;
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .9rem;
      letter-spacing: .03em;
      padding: .7rem 2.8rem .7rem 1rem;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .form-group input:focus {
      border-color: var(--p-orange);
      background: rgba(247,168,0,.06);
      box-shadow: 0 0 0 3px rgba(247,168,0,.1);
    }
    .form-group input::placeholder { color: rgba(255,255,255,.2); letter-spacing: .2em; }

    .toggle-eye {
      position: absolute;
      right: .8rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: rgba(255,255,255,.3);
      padding: 0;
      transition: color .2s;
      line-height: 1;
    }
    .toggle-eye:hover { color: var(--p-orange); }

    .hint {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem;
      letter-spacing: .04em;
      color: rgba(255,255,255,.25);
      margin-top: .35rem;
    }

    .strength-bar {
      height: 3px;
      border-radius: 2px;
      margin-top: .4rem;
      background: rgba(255,255,255,.08);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width .3s, background .3s;
    }

    .btn-submit {
      width: 100%;
      padding: .85rem;
      margin-top: .5rem;
      background: linear-gradient(90deg, #e09500, var(--p-orange), #e09500);
      background-size: 200%;
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: .15em;
      cursor: pointer;
      transition: background-position .4s, box-shadow .3s, transform .15s;
      box-shadow: 0 4px 20px rgba(247,168,0,.3);
    }
    .btn-submit:hover {
      background-position: right;
      box-shadow: 0 6px 28px rgba(247,168,0,.5);
      transform: translateY(-1px);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .links-container {
      display: flex;
      justify-content: center;
      margin-top: 1.2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .links-container a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem;
      letter-spacing: .06em;
      color: rgba(255,255,255,.35);
      text-decoration: none;
      transition: color .2s;
    }
    .links-container a:hover { color: var(--p-orange); }

    .login-footer {
      margin-top: 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.15);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.2rem 1.2rem; border-radius: 14px; }
      .badge-title { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <div class="badge">
    <span class="badge-icon" id="badgeIcon">🔄</span>
    <div class="badge-title" id="badgeTitulo">CAMBIAR <span>CONTRASEÑA</span></div>
    <div class="badge-sub">Sportline · Álbum Estrellas · 2026</div>
  </div>

  <div class="card">
    <div class="store-banner" id="bannerTienda">
      <span id="bannerTexto">Actualizando contraseña para</span>&nbsp;<strong id="lblNombreTienda">Cargando...</strong>
    </div>

    <div id="alertMsg" class="alert alert-error"></div>

    <form id="cambiarForm">

      <div class="form-group" id="grupoActual">
        <label for="pwdActual">Contraseña actual</label>
        <div class="input-wrap">
          <input type="password" id="pwdActual" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-eye" onclick="toggleVer('pwdActual',this)">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label for="pwdNueva">Contraseña nueva</label>
        <div class="input-wrap">
          <input type="password" id="pwdNueva" placeholder="••••••••" required autocomplete="new-password">
          <button type="button" class="toggle-eye" onclick="toggleVer('pwdNueva',this)">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="hint" id="strengthTxt">Mínimo 6 caracteres</div>
      </div>

      <div class="form-group">
        <label for="pwdConfirmar">Confirmar contraseña nueva</label>
        <div class="input-wrap">
          <input type="password" id="pwdConfirmar" placeholder="••••••••" required autocomplete="new-password">
          <button type="button" class="toggle-eye" onclick="toggleVer('pwdConfirmar',this)">👁</button>
        </div>
        <div class="hint" id="matchHint"></div>
      </div>

      <button type="submit" class="btn-submit" id="btnGuardar">🔐 Guardar Nueva Contraseña</button>
    </form>

    <div class="links-container">
      <a href="index.html">← Volver al inicio de sesión</a>
    </div>
  </div>

  <div class="login-footer">Sportline Corp · Álbum Digital · 2026</div>
