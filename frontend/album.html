<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum Estrellas - Vista Corporativa</title>
  <style>
    /* TU DISEÑO ORIGINAL RESTAURADO AL 100% */
    body {
      margin: 0;
      padding: 0;
      background-color: #050a18;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .header-album {
      background: linear-gradient(135deg, #111a36, #1c2541);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ffcc00;
    }
    .header-album h1 {
      margin: 0;
      font-size: 26px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .header-album h1 span {
      color: #ffcc00;
    }
    .btn-salir {
      background-color: #e11d48;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
    }
    .main-container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 30px;
    }
    .panel-metas {
      display: flex;
      justify-content: space-between;
      background: #111a36;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #232f52;
      margin-bottom: 40px;
    }
    .meta-box {
      text-align: center;
      flex: 1;
    }
    .meta-box h4 {
      margin: 0;
      font-size: 36px;
      color: #ffcc00;
    }
    .meta-box p {
      margin: 5px 0 0 0;
      color: #94a3b8;
      font-size: 13px;
      text-transform: uppercase;
    }
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 30px;
    }
    .sticker-card {
      background: #1c2541;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      border: 2px solid #3a506b;
      position: relative;
    }
    .sticker-card.locked {
      filter: grayscale(100%);
      opacity: 0.3;
    }
    .sticker-card .icon-star {
      font-size: 60px;
      margin-bottom: 15px;
    }
    .sticker-card h3 {
      margin: 10px 0 5px 0;
      font-size: 16px;
      color: #ffffff;
    }
    .sticker-card p {
      margin: 0;
      font-size: 12px;
      color: #ffcc00;
    }
    .lock-overlay {
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 34px;
      color: #ef4444;
      display: none;
    }
    .locked .lock-overlay {
      display: block;
    }
  </style>
</head>
<body>

  <div class="header-album">
    <h1 id="lblTienda">SUCURSAL: <span id="nombreTiendaDinamico">CARGANDO...</span></h1>
    <button class="btn-salir" onclick="cerrarSesion()">Cerrar Sesión</button>
  </div>

  <div class="main-container">
    <div class="panel-metas">
      <div class="meta-box">
        <h4 id="valDesbloqueadas">4</h4>
        <p>Estrellas Ganadas</p>
      </div>
      <div class="meta-box">
        <h4 id="valMeta">83%</h4>
        <p>Cumplimiento de Meta</p>
      </div>
      <div class="meta-box">
        <h4>Semana 6</h4>
        <p>Periodo de Medición</p>
      </div>
    </div>

    <div class="album-grid" id="wrapperAlbum">
      </div>
  </div>

  <script>
    const API_URL = "https://album-cdt-mundial.onrender.com/api";
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = 'index.html';
    }

    function cerrarSesion() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    async function inicializarAlbum() {
      // Pintar cabecera con los datos guardados en el login corporativo
      document.getElementById('nombreTiendaDinamico').innerText = localStorage.getItem('nombreTienda') || "SPORTLINE SUCURSAL";
      
      const response = await fetch(`${API_URL}/tiendas/`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      const wrapper = document.getElementById('wrapperAlbum');
      wrapper.innerHTML = '';

      const catalogoOriginal = [
        { id: 1, name: "Balón Oficial Nike", code: "SL-001", locked: false },
        { id: 2, name: "Zapatilla Air Max Pro", code: "SL-002", locked: false },
        { id: 3, name: "Camiseta De Panamá", code: "SL-003", locked: false },
        { id: 4, name: "Gorra Running Speed", code: "SL-004", locked: false },
        { id: 5, name: "Medias de Compresión", code: "SL-005", locked: true },
        { id: 6, name: "Tacos Mercurial Elite", code: "SL-006", locked: true },
        { id: 7, name: "Maletín Deportivo L", code: "SL-007", locked: true },
        { id: 8, name: "Banda de Capitán Pro", code: "SL-008", locked: true }
      ];

      catalogoOriginal.forEach(item => {
        wrapper.innerHTML += `
          <div class="sticker-card ${item.locked ? 'locked' : ''}">
            <div class="lock-overlay">🔒</div>
            <div class="icon-star">🥇</div>
            <h3>${item.name}</h3>
            <p>${item.code}</p>
          </div>
        `;
      });
    }

    window.onload = inicializarAlbum;
  </script>
</body>
</html>
