<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum Estrellas — Sportline</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --p-navy:   #001f5e;
      --p-blue:   #0046AD;
      --p-orange: #F7A800;
      --p-red:    #E8231A;
      --p-gold:   #f0c030;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(160deg, #010a1e 0%, #021233 60%, #010c24 100%);
      min-height: 100vh;
      font-family: 'Barlow', sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── NAVBAR ─────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 500;
      background: linear-gradient(90deg, #000d2e 0%, #001a55 50%, #000d2e 100%);
      border-bottom: 3px solid var(--p-orange);
      box-shadow: 0 4px 24px rgba(0,0,0,.6);
      padding: .6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex: 1;
    }
    .nav-icon {
      font-size: 1.6rem;
      filter: drop-shadow(0 0 8px rgba(247,168,0,.6));
    }
    .nav-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: .12em;
      color: #fff;
      line-height: 1;
    }
    .nav-title span { color: var(--p-orange); }
    .nav-store {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      letter-spacing: .15em;
      color: rgba(255,255,255,.45);
      text-transform: uppercase;
    }
    .btn-salir {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      background: rgba(232,35,26,.15);
      color: #ff6b6b;
      border: 1.5px solid rgba(232,35,26,.5);
      border-radius: 20px;
      padding: .35rem 1rem;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-salir:hover {
      background: var(--p-red);
      color: #fff;
      border-color: var(--p-red);
      box-shadow: 0 0 16px rgba(232,35,26,.5);
    }

    /* ── HERO STATS ─────────────────────────────────────────── */
    .hero-stats {
      max-width: 900px;
      margin: 2.5rem auto 2rem;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .stat-card {
      background: linear-gradient(135deg, rgba(0,70,173,.2), rgba(0,30,90,.3));
      border: 1.5px solid rgba(247,168,0,.25);
      border-radius: 14px;
      padding: 1.2rem 1rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--p-orange), transparent);
    }
    .stat-n {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--p-orange);
      line-height: 1;
      text-shadow: 0 0 20px rgba(247,168,0,.4);
    }
    .stat-l {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-top: .3rem;
    }

    /* ── SECTION TITLE ──────────────────────────────────────── */
    .section-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }
    .section-title-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: .8rem;
      border-bottom: 2px solid rgba(247,168,0,.2);
    }
    .section-title-bar h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: .1em;
      color: #fff;
    }
    .section-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: rgba(247,168,0,.15);
      color: var(--p-orange);
      border: 1px solid rgba(247,168,0,.3);
      border-radius: 20px;
      padding: .2rem .7rem;
    }

    /* ── STICKER GRID ───────────────────────────────────────── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.2rem;
    }

    /* ── STICKER CARD ───────────────────────────────────────── */
    .sticker-card {
      background: linear-gradient(160deg, #0d1e4a 0%, #091535 100%);
      border: 1.5px solid rgba(255,255,255,.08);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      aspect-ratio: 9/13;
      display: flex;
      flex-direction: column;
    }
    .sticker-card:hover {
      transform: translateY(-6px) scale(1.03);
      border-color: var(--p-orange);
      box-shadow: 0 12px 40px rgba(247,168,0,.35), 0 0 0 1px rgba(247,168,0,.2);
      z-index: 10;
    }

    /* Top color band */
    .card-band {
      height: 8px;
      background: linear-gradient(90deg, var(--p-blue), #0069d9);
      flex-shrink: 0;
    }
    .sticker-card.gold .card-band {
      background: linear-gradient(90deg, #7a5500, var(--p-gold));
    }

    /* Card number */
    .card-num {
      position: absolute;
      top: 14px;
      left: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: .7rem;
      color: rgba(255,255,255,.35);
      letter-spacing: .05em;
    }

    /* Icon / photo area */
    .card-photo {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card-icon {
      font-size: 4rem;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.5));
      transition: transform .25s, filter .25s;
    }
    .sticker-card:hover .card-icon {
      transform: scale(1.1);
      filter: drop-shadow(0 0 16px rgba(247,168,0,.5));
    }

    /* Card footer info */
    .card-footer {
      background: rgba(0,0,0,.35);
      border-top: 1px solid rgba(255,255,255,.06);
      padding: .55rem .7rem;
    }
    .card-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: .62rem;
      color: var(--p-orange);
      letter-spacing: .1em;
      margin-bottom: .15rem;
    }
    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      letter-spacing: .02em;
    }

    /* ── LOCKED STATE ───────────────────────────────────────── */
    .sticker-card.locked {
      opacity: .35;
      filter: grayscale(1);
      cursor: not-allowed;
    }
    .sticker-card.locked:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,.2);
      box-shadow: 0 6px 20px rgba(0,0,0,.4);
      opacity: .45;
      filter: grayscale(.7);
    }
    .lock-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-60%);
      font-size: 1.8rem;
      opacity: .7;
      display: none;
      pointer-events: none;
    }
    .locked .lock-badge { display: block; }

    /* ── WATERMARK ──────────────────────────────────────────── */
    .card-watermark {
      position: absolute;
      bottom: 38px;
      right: 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      color: rgba(255,255,255,.04);
      letter-spacing: .05em;
      pointer-events: none;
      user-select: none;
    }

    /* ── FOOTER ─────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .7rem;
      letter-spacing: .12em;
      color: rgba(255,255,255,.2);
      text-transform: uppercase;
      border-top: 1px solid rgba(255,255,255,.05);
    }

    @media (max-width: 600px) {
      .hero-stats { grid-template-columns: repeat(3,1fr); gap: .6rem; }
      .stat-n { font-size: 2rem; }
      .album-grid { grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: .8rem; }
      nav { padding: .5rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-brand">
      <img src="logo.png" alt="Sportline" style="height:38px;width:auto;filter:drop-shadow(0 0 8px rgba(247,168,0,.5));" onerror="this.outerHTML='<span class=\'nav-icon\'>⭐</span>'">
      <div>
        <div class="nav-title">ÁLBUM <span>ESTRELLAS</span></div>
        <div class="nav-store" id="lblTienda">Cargando sucursal...</div>
      </div>
    </div>
    <a href="cambiar-clave.html" style="
      font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;text-decoration:none;
      background:rgba(0,70,173,.15);color:rgba(255,255,255,.5);
      border:1.5px solid rgba(0,70,173,.3);border-radius:20px;
      padding:.35rem .9rem;transition:all .2s;"
      onmouseover="this.style.background='rgba(0,70,173,.35)';this.style.color='#fff'"
      onmouseout="this.style.background='rgba(0,70,173,.15)';this.style.color='rgba(255,255,255,.5)'">
      🔄 Cambiar Clave
    </a>
    <button class="btn-salir" onclick="cerrarSesion()">✕ Cerrar Sesión</button>
  </nav>

  <!-- HERO STATS -->
  <div class="hero-stats">
    <div class="stat-card">
      <div class="stat-n" id="valDesbloqueadas">5</div>
      <div class="stat-l">Estrellas Ganadas</div>
    </div>
    <div class="stat-card">
      <div class="stat-n" id="valMeta">100%</div>
      <div class="stat-l">Cumplimiento de Meta</div>
    </div>
    <div class="stat-card">
      <div class="stat-n">S8</div>
      <div class="stat-l">Periodo de Medición</div>
    </div>
  </div>

  <!-- ALBUM -->
  <div class="section-wrapper">
    <div class="section-title-bar">
      <h2>⭐ TUS ESTRELLAS</h2>
      <span class="section-badge" id="badge-count">8 estrellas</span>
    </div>
    <div class="album-grid" id="wrapperAlbum"></div>
  </div>

  <footer>Álbum Estrellas · Sportline · Mundial 2026</footer>

  <!-- REPRODUCTOR FLOTANTE — Canción Oficial FIFA Mundial 2026 -->
  <div style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;text-align:right;">
    <div id="ytBox" style="display:none;margin-bottom:.6rem;border-radius:14px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.8);border:1.5px solid rgba(247,168,0,.4);">
      <div style="background:#000d2e;padding:.4rem .8rem;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.08em;color:rgba(255,255,255,.5);text-align:left;">
        🎵 CANCIÓN OFICIAL · FIFA MUNDIAL 2026
      </div>
      <iframe id="ytIframe" width="280" height="158"
        src="about:blank"
        data-src="https://www.youtube.com/embed/X9CsK_nuqdE?autoplay=1&rel=0"
        allow="autoplay; encrypted-media" allowfullscreen
        style="border:none;display:block;">
      </iframe>
    </div>
    <button id="musicBtn" onclick="toggleMusica()" title="Canción Oficial Mundial 2026"
      style="width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#001f5e,#0046AD);
      border:2px solid rgba(247,168,0,.6);color:#F7A800;font-size:1.5rem;cursor:pointer;
      box-shadow:0 4px 24px rgba(0,70,173,.6);transition:all .25s;outline:none;
      animation:musicGlow 2.5s infinite;">🎵</button>
  </div>
  <style>
    @keyframes musicGlow {
      0%,100% { box-shadow:0 4px 24px rgba(0,70,173,.6),0 0 0 0 rgba(247,168,0,.4); }
      50%      { box-shadow:0 4px 24px rgba(0,70,173,.6),0 0 0 10px rgba(247,168,0,.0); }
    }
  </style>
  <script>
    function toggleMusica() {
      var box   = document.getElementById('ytBox');
      var btn   = document.getElementById('musicBtn');
      var frame = document.getElementById('ytIframe');
      if (box.style.display === 'none') {
        if (frame.src === 'about:blank') frame.src = frame.dataset.src;
        box.style.display = 'block';
        btn.textContent = '⏸';
      } else {
        box.style.display = 'none';
        btn.textContent = '🎵';
      }
    }
  </script>

  <script>
    const API_URL  = "https://album-cdt-mundial.onrender.com/api";
    const token    = localStorage.getItem('token');

    if (!token) window.location.href = 'index.html';

    function cerrarSesion() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // Emoji de figurita según el cargo del empleado
    function iconoPorCargo(cargo) {
      const c = (cargo || '').toLowerCase();
      if (c.includes('gerente') || c.includes('director')) return '👑';
      if (c.includes('supervisor'))  return '🎯';
      if (c.includes('cajero') || c.includes('caja')) return '💳';
      if (c.includes('bodega') || c.includes('almac')) return '📦';
      if (c.includes('visual'))      return '🎨';
      return '⭐';
    }

    function renderizarAlbum(empleados, semana) {
      const wrapper = document.getElementById('wrapperAlbum');
      wrapper.innerHTML = '';

      if (!empleados.length) {
        wrapper.innerHTML = `
          <div style="grid-column:1/-1;text-align:center;padding:3rem 1rem;
               font-family:'Barlow Condensed',sans-serif;font-size:.9rem;
               letter-spacing:.06em;color:rgba(255,255,255,.35);">
            📋 No hay empleados asignados a tu sucursal para ${semana ? semana.nombre : 'esta semana'}.<br>
            <span style="font-size:.75rem;opacity:.6;">Contacta al administrador para registrar el equipo.</span>
          </div>`;
        return;
      }

      const desbloqueados = empleados.filter(e => e.desbloqueado).length;
      document.getElementById('valDesbloqueadas').textContent = desbloqueados;
      document.getElementById('badge-count').textContent = `${empleados.length} figuritas`;

      empleados.forEach(emp => {
        const icono = iconoPorCargo(emp.cargo);
        const esGold = emp.desbloqueado;
        const imgTag = emp.foto_url
          ? `<img src="${emp.foto_url}" alt="${emp.nombre}"
                  style="width:80px;height:80px;border-radius:50%;object-fit:cover;
                         border:2px solid rgba(247,168,0,.4);"
                  onerror="this.outerHTML='<span class=\\'card-icon\\'>${icono}</span>'">`
          : `<span class="card-icon">${icono}</span>`;

        wrapper.innerHTML += `
          <div class="sticker-card ${emp.desbloqueado ? '' : 'locked'} ${esGold ? 'gold' : ''}">
            <div class="card-band"></div>
            <div class="card-num">#${String(emp.numero).padStart(3,'0')}</div>
            <div class="card-watermark">SL</div>
            <div class="lock-badge">🔒</div>
            <div class="card-photo">${imgTag}</div>
            <div class="card-footer">
              <div class="card-code">${emp.cargo || 'Asesor de Ventas'}</div>
              <div class="card-name">${emp.nombre}</div>
            </div>
          </div>`;
      });
    }

    async function inicializarAlbum() {
      const nombreTienda = localStorage.getItem('nombreTienda') || 'SPORTLINE SUCURSAL';
      document.getElementById('lblTienda').textContent = nombreTienda;

      try {
        const res = await fetch(`${API_URL}/album/`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (res.status === 401) {
          localStorage.clear();
          window.location.href = 'index.html';
          return;
        }

        if (!res.ok) throw new Error('API error');

        const data = await res.json();

        // Actualizar stats con datos reales
        const semanaLabel = data.semana ? data.semana.nombre : 'S—';
        document.getElementById('valDesbloqueadas').textContent = data.desbloqueados ?? 0;
        document.getElementById('valMeta').textContent =
          data.total > 0 ? `${Math.round((data.desbloqueados / data.total) * 100)}%` : '—';
        document.querySelector('.stat-n:last-of-type, #semanaLabel') && null;
        // Actualiza el tercer stat card con la semana real
        const statCards = document.querySelectorAll('.stat-n');
        if (statCards[2]) statCards[2].textContent = data.semana ? `S${data.semana.numero}` : 'S—';

        renderizarAlbum(data.empleados || [], data.semana);

      } catch {
        // Fallback visual mientras el backend está en frío (Render free tier)
        console.warn('Backend no disponible, mostrando demo.');
        document.querySelector('.stat-n:nth-child(1)') && null;

        const demo = [
          { numero:1, nombre:'Ana García',      cargo:'Gerente de Tienda',    desbloqueado:true,  foto_url:null },
          { numero:2, nombre:'Carlos López',    cargo:'Asesor de Ventas',     desbloqueado:true,  foto_url:null },
          { numero:3, nombre:'María Rodríguez', cargo:'Supervisora',          desbloqueado:true,  foto_url:null },
          { numero:4, nombre:'José Martínez',   cargo:'Asesor de Ventas',     desbloqueado:false, foto_url:null },
          { numero:5, nombre:'Laura Pérez',     cargo:'Cajera',               desbloqueado:false, foto_url:null },
          { numero:6, nombre:'Diego Torres',    cargo:'Visual Merchandiser',  desbloqueado:false, foto_url:null },
        ];

        document.getElementById('valDesbloqueadas').textContent = 3;
        document.getElementById('valMeta').textContent = '50%';
        document.getElementById('badge-count').textContent = `${demo.length} figuritas (demo)`;
        renderizarAlbum(demo, { nombre: 'Semana 2 — Demo' });
      }
    }

    window.onload = inicializarAlbum;
  </script>
</body>
</html>
