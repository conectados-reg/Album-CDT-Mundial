<div style="text-align: center; margin-top: 15px;">
  <a href="#" id="btnAbrirRegistro" style="color: #ffffff; text-decoration: none; margin-right: 15px; font-size: 14px;">📝 Registrar Tienda</a>
  <a href="#" id="btnOlvidePassword" style="color: #ffcc00; text-decoration: none; font-size: 14px;">❓ Olvidé mi contraseña</a>
</div>

<div id="modalRegistro" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 999;">
  <div style="background: #1e293b; padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; color: white; border: 2px solid #ffcc00;">
    <h3 style="margin-top: 0; color: #ffcc00; text-align: center;">Registrar Nueva Tienda</h3>
    <form id="formRegistro">
      <label>Nombre de la Tienda:</label>
      <input type="text" id="regNombre" required style="width: 100%; padding: 8px; margin: 8px 0; border-radius: 4px; border: none;">
      
      <label>Correo Electrónico:</label>
      <input type="email" id="regEmail" required style="width: 100%; padding: 8px; margin: 8px 0; border-radius: 4px; border: none;">
      
      <label>Crea tu Contraseña:</label>
      <input type="password" id="regPassword" required style="width: 100%; padding: 8px; margin: 8px 0; border-radius: 4px; border: none;">
      
      <label>Región / Ciudad (Opcional):</label>
      <input type="text" id="regRegion" style="width: 100%; padding: 8px; margin: 8px 0; border-radius: 4px; border: none;">
      
      <button type="submit" style="width: 100%; padding: 10px; background: #ffcc00; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #111;">CREAR CUENTA</button>
      <button type="button" id="btnCerrarRegistro" style="width: 100%; padding: 8px; background: #64748b; border: none; border-radius: 4px; color: white; cursor: pointer; margin-top: 5px;">Cancelar</button>
    </form>
  </div>
</div>
