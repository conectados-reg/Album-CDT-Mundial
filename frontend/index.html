<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum Estrellas - Iniciar Sesión</title>
  <style>
    /* RECOBRANDO TU DISEÑO ORIGINAL */
    body {
      margin: 0;
      padding: 0;
      background-color: #0b1329;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }
    .login-container {
      background-color: #1c2541;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      border: 1px solid #3a506b;
      width: 100%;
      max-width: 420px;
      box-sizing: border-box;
      text-align: center;
    }
    .login-container h2 {
      margin-top: 0;
      color: #ffcc00;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 25px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #3a506b;
      background-color: #0b1329;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #ffcc00;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: #ffcc00;
      color: #0b1329;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .btn-submit:hover {
      background-color: #e6b800;
    }
    .links-container {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }
    .links-container a {
      color: #ffaa00;
      text-decoration: none;
    }
    .links-container a:hover {
      text-decoration: underline;
    }
    .error-msg {
      color: #ff4d4d;
      background: rgba(255, 77, 77, 0.1);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 13px;
      display: none;
      border: 1px solid #ff4d4d;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Álbum Estrellas</h2>
    
    <div id="errorAlerta" class="error-msg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="selectTienda">Selecciona tu Sucursal o Cuenta:</label>
        <select id="selectTienda" required>
          <option value="">-- Elige una cuenta --</option>
          <option value="admin@sportline.com">🔐 Cuenta Administrador</option>
          
          <optgroup label="🇵🇦 PANAMÁ">
            <option value="albrook.mega@sportline.com.pa">Sportline Albrook Megastore</option>
            <option value="multiplaza@sportline.com.pa">Sportline Multiplaza Pacific</option>
            <option value="metromall@sportline.com.pa">Sportline Metromall</option>
          </optgroup>

          <optgroup label="🇨🇷 COSTA RICA">
            <option value="oxigeno@sportline.co.cr">Sportline Oxígeno Human Playground</option>
            <option value="multiplaza.escazu@sportline.co.cr">Sportline Multiplaza Escazú</option>
          </optgroup>

          <optgroup label="🇬🇹 GUATEMALA">
            <option value="miraflores@sportline.com.gt">Sportline Miraflores</option>
            <option value="oakland@sportline.com.gt">Sportline Oakland Mall</option>
          </optgroup>

          <optgroup label="🇩🇴 REPÚBLICA DOMINICANA">
            <option value="agora@sportline.com.do">Sportline Ágora Mall</option>
          </optgroup>
        </select>
      </div>

      <input type="hidden" id="txtEmail" value="">

      <div class="form-group">
        <label for="txtPassword">Contraseña de Acceso:</label>
        <input type="password" id="txtPassword" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">Ingresar al Sistema</button>
    </form>

    <div class="links-container">
      <a href="cambiar-clave.html">🔄 Cambiar Contraseña</a>
      <a href="olvide-clave.html">❓ Olvidé mi clave</a>
    </div>
  </div>

  <script>
    const API_URL = "https://album-cdt-mundial.onrender.com/api";

    // Sincronizar el select con el campo interno antes de enviar
    document.getElementById('selectTienda').addEventListener('change', function() {
      document.getElementById('txtEmail').value = this.value;
    });

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const emailSelected = document.getElementById('selectTienda').value;
      const password = document.getElementById('txtPassword').value;
      const errorAlerta = document.getElementById('errorAlerta');

      errorAlerta.style.display = 'none';

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: emailSelected, password: password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorAlerta.innerText = data.error || "Error de credenciales.";
          errorAlerta.style.display = 'block';
          return;
        }

        // Almacenar credenciales corporativas de forma exitosa
        localStorage.setItem('token', data.token);
        localStorage.setItem('esAdmin', data.esAdmin ? 'true' : 'false');
        
        if (!data.esAdmin && data.tienda) {
          localStorage.setItem('nombreTienda', data.tienda.nombre);
          localStorage.setItem('codigoTienda', data.tienda.codigo);
        }

        // Redirección inmediata según el rol
        window.location.href = data.redirect;

      } catch (error) {
        errorAlerta.innerText = "No se pudo conectar con Render. Revisa tu conexión.";
        errorAlerta.style.display = 'block';
      }
    };
  </script>
</body>
</html>
