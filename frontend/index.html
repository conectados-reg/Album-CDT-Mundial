<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Álbum Estrellas — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--p-blue:#0046AD;--p-navy:#002B6E;--p-orange:#F7A800;--p-red:#E8231A;--blanco:#ffffff;--borde:rgba(255,255,255,0.15);}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:linear-gradient(160deg,#001f5e 0%,#003580 50%,#1a0a3d 100%);font-family:'Barlow',sans-serif;display:flex;align-items:center;justify-content:center;overflow-x:hidden;}
.login-wrap{width:100%;max-width:440px;margin:1rem;position:relative;z-index:1;}
.login-card{background:rgba(255,255,255,0.07);border:1px solid var(--borde);border-radius:20px;padding:3rem 2.5rem;backdrop-filter:blur(24px);box-shadow:0 32px 64px rgba(0,0,0,0.45);}
.login-badge{display:inline-block;background:var(--p-orange);color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.32rem 1rem;border-radius:30px;margin-bottom:1.4rem;}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;line-height:1;letter-spacing:.04em;color:#fff;}
.login-title span{color:var(--p-orange);}
.login-subtitle{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin:0.5rem 0 2rem;}
.form-group{margin-bottom:1.2rem;}
label{display:block;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:.5rem;}
input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:.85rem 1.1rem;color:#fff;font-size:.95rem;outline:none;transition:all .2s;}
input:focus{border-color:var(--p-orange);background:rgba(255,255,255,.12);}
.btn-login{width:100%;background:var(--p-orange);color:#000;border:none;border-radius:10px;padding:1rem;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.15em;text-transform:uppercase;margin-top:1rem;}
.btn-login:hover{background:#e69900;}
.login-error{color:#ff6b6b;font-size:.82rem;text-align:center;margin-top:.6rem;min-height:1.2rem;}
.demo-hint{margin-top:1.5rem;background:rgba(247,168,0,.08);border:1px solid rgba(247,168,0,.2);border-radius:10px;padding:1rem;}
.demo-hint p{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:.3rem;}
.demo-hint code{display:block;font-size:.75rem;color:var(--p-orange);font-family:monospace;line-height:1.6;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-badge">Acceso Corporativo</div>
    <h1 class="login-title">ÁLBUM<br><span>ESTRELLAS</span></h1>
    <p class="login-subtitle">Reconocimiento de Ventas · Mundial 2026</p>

    <form id="loginForm">
      <div class="form-group">
        <label>Código o Email Admin</label>
        <input type="text" id="storeCode" placeholder="TDA-001 o admin@empresa.com" required />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <div id="loginError" class="login-error"></div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <div class="demo-hint">
      <p>Modo de ingreso al sistema:</p>
      <code>
        Tiendas: Usar código asignado (ej: TDA-001)<br>
        Admins: Usar correo electrónico registrado
      </code>
    </div>
  </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
