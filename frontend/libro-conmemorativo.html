  <style>
    :root {
      --navy:   #001f5e;
      --blue:   #0046AD;
      --orange: #F7A800;
      --red:    #E8231A;
      --gold:   #F7C800;
      --cream:  #fdf6e3;
      --page-bg:#f5edd8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: radial-gradient(ellipse at top, #001a55 0%, #000d2e 60%, #010812 100%);
      min-height: 100vh; overflow-x: hidden; color: #fff;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at top, #001a55 0%, #000a20 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
    }
    .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(247,168,0,.2);
      border-top-color: var(--orange); border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.5); }

    /* ── PORTADA ── */
    #portada {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #002080 0%, #000c28 70%);
      overflow: hidden; transition: opacity .6s ease, transform .6s ease;
    }
    #portada.saliendo { opacity: 0; transform: scale(1.06); pointer-events: none; }

    .portada-estrellas {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .portada-estrellas::before, .portada-estrellas::after {
      content: '';
      position: absolute; border-radius: 50%; opacity: .08;
    }
    .portada-estrellas::before {
      width: 600px; height: 600px; top: -200px; left: -150px;
      background: radial-gradient(circle, var(--orange) 0%, transparent 70%);
    }
    .portada-estrellas::after {
      width: 500px; height: 500px; bottom: -150px; right: -100px;
      background: radial-gradient(circle, var(--blue) 0%, transparent 70%);
    }

    .portada-badge {
      font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: .25em; text-transform: uppercase;
      background: rgba(247,168,0,.12); color: var(--orange);
      border: 1px solid rgba(247,168,0,.3); border-radius: 20px;
      padding: .35rem 1.1rem; margin-bottom: 1.2rem;
    }
    .portada-icon { font-size: 3.5rem; margin-bottom: .8rem; filter: drop-shadow(0 0 20px rgba(247,168,0,.5)); }
    .portada-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: .08em; line-height: .9; text-align: center;
      background: linear-gradient(135deg, #fff 20%, var(--gold) 60%, var(--orange) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,.5));
      margin-bottom: .4rem;
    }
    .portada-subtitle {
      font-family: 'Barlow Condensed', sans-serif; font-size: clamp(.85rem, 2.5vw, 1.1rem);
      font-weight: 400; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(255,255,255,.5); margin-bottom: 2.5rem; text-align: center;
    }
    .portada-divider {
      width: 80px; height: 3px; margin: 0 auto 2rem;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }
    .btn-abrir {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      background: linear-gradient(135deg, var(--orange) 0%, #e08900 100%);
      color: #000; border: none; border-radius: 30px;
      padding: .85rem 2.4rem; cursor: pointer;
      box-shadow: 0 8px 32px rgba(247,168,0,.4);
      transition: all .25s; position: relative; overflow: hidden;
    }
    .btn-abrir::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.25), transparent);
      border-radius: 30px;
    }
    .btn-abrir:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(247,168,0,.55); }
    .btn-abrir:active { transform: translateY(0); }
    .portada-stats {
      display: flex; gap: 2.5rem; margin-top: 2rem;
    }
    .portada-stat {
      text-align: center;
    }
    .portada-stat-num {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .05em;
      color: var(--orange); display: block; line-height: 1;
    }
    .portada-stat-lbl {
      font-family: 'Barlow Condensed', sans-serif; font-size: .62rem; letter-spacing: .15em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
    }

    /* ── LIBRO ── */
    #libro { display: none; flex-direction: column; align-items: center; min-height: 100vh; padding: 1.5rem 1rem 5rem; }
    #libro.visible { display: flex; }

    .libro-header {
      width: 100%; max-width: 1100px;
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .btn-back {
      font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      background: rgba(255,255,255,.07); color: rgba(255,255,255,.6);
      border: 1px solid rgba(255,255,255,.12); border-radius: 20px;
      padding: .4rem 1rem; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: .4rem;
    }
    .btn-back:hover { background: rgba(255,255,255,.12); color: #fff; }
    .libro-header-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .1em;
      flex: 1;
    }
    .libro-header-title span { color: var(--orange); }
    .libro-meta {
      font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; letter-spacing: .1em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
    }

    /* ── TAPA DEL LIBRO (marco de cuero con canto de páginas) ── */
    .book-frame {
      width: 100%; max-width: 1100px;
      position: relative;
      padding: 16px 16px 28px;
      border-radius: 20px;
      background:
        repeating-linear-gradient(125deg, rgba(255,255,255,.045) 0px, rgba(255,255,255,.045) 1px, transparent 1px, transparent 7px),
        linear-gradient(155deg, #1a3868 0%, #081733 55%, #1a3868 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.14),
        inset 0 0 0 1px rgba(247,168,0,.5),
        0 3px 0 rgba(0,0,0,.55),
        0 40px 90px rgba(0,0,0,.75);
    }
    .book-frame::before, .book-frame::after {
      content: '';
      position: absolute; left: 24px; right: 24px;
      height: 10px; border-radius: 0 0 8px 8px; z-index: 0;
    }
    .book-frame::before { bottom: 8px; background: linear-gradient(180deg,#efe6cc,#ddd0a6); box-shadow: 0 5px 10px rgba(0,0,0,.3); }
    .book-frame::after  { bottom: 1px; background: linear-gradient(180deg,#ddd0a6,#c9bb8e); box-shadow: 0 5px 12px rgba(0,0,0,.35); }

    /* ── LIBRO (motor real StPageFlip: curva de página, una a una) ── */
    .book-container {
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    .book-container .stf__parentBook { margin: 0 auto; }
    .book-container .stf__block { outline: none; }
    .pf-page {
      background: var(--page-bg);
      padding: 1.4rem 1.2rem 1.2rem;
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.05);
      overflow: hidden;
    }
    .page-num {
      font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(0,0,0,.3);
      text-align: center; margin-bottom: .7rem;
    }
    /* ── Página crema vacía: collage sutil en blanco y negro ── */
    .blank-page {
      position: relative; height: 100%;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .blank-collage {
      position: absolute; inset: 0; z-index: 0;
      display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr;
      filter: grayscale(1) contrast(1.05);
      opacity: .16;
    }
    .blank-page .page-num { position: relative; z-index: 1; margin-bottom: 0; }
    /* ── REGION BANNER (marcador deportivo premium) ── */
    .region-banner {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: .9rem;
      background: rgba(0,0,0,.3); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,.16); border-top: 3px solid var(--orange);
      border-radius: 12px; padding: .65rem .9rem;
      margin-bottom: 1.1rem;
      box-shadow: 0 10px 26px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.08);
    }
    .region-banner-flag {
      flex-shrink: 0; width: 46px; height: 34px; border-radius: 6px;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.08);
      box-shadow: 0 3px 10px rgba(0,0,0,.5), 0 0 0 2px rgba(255,255,255,.55);
    }
    .region-banner-text { flex: 1; min-width: 0; }
    .region-banner-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem; line-height: 1;
      letter-spacing: .04em; color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,.35);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .region-banner-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .62rem; letter-spacing: .1em;
      text-transform: uppercase; color: rgba(255,255,255,.55); margin-top: .2rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .region-banner-count {
      flex-shrink: 0; text-align: center;
      background: rgba(247,168,0,.14); border: 1.5px solid rgba(247,168,0,.45);
      border-radius: 10px; padding: .3rem .75rem;
    }
    .region-banner-count-num {
      display: block; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
      color: var(--orange); line-height: 1;
    }
    .region-banner-count-lbl {
      display: block; font-family: 'Barlow Condensed', sans-serif; font-size: .48rem;
      letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.55);
      margin-top: .1rem;
    }

    /* ── TEXTURA PREMIUM de fondo (líneas + brillos, estilo hero FanSLA) ── */
    .page-premium-bg { position: relative; }
    .page-premium-bg::before {
      content: '';
      position: absolute; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 55% 40% at 12% 10%, rgba(255,255,255,.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 45% at 92% 90%, rgba(0,0,0,.22) 0%, transparent 60%),
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: auto, auto, 32px 32px, 32px 32px;
    }

    /* ── FIGURITA GRID (estilo sticker de FanSLA) ── */
    .sticker-grid {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .6rem;
      flex: 1;
      align-content: start;
    }
    .sticker {
      position: relative;
      aspect-ratio: 9 / 13;
      border-radius: 10px;
      overflow: hidden;
      display: flex; flex-direction: column;
      background: #fff; border: 3px solid #fff;
      box-shadow: 4px 6px 20px rgba(0,0,0,.45);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
      cursor: default;
    }
    .sticker::after {
      content: '';
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: linear-gradient(160deg, rgba(255,255,255,.25) 0%, rgba(255,255,255,0) 28%);
    }

    .sticker-info {

      position: relative; z-index: 3;
      border-top: 3px solid var(--orange);
    }
    .sticker-label-name {
      font-family: 'Bebas Neue', sans-serif; font-size: .68rem; line-height: 1.1;
      color: #fff; text-transform: uppercase; letter-spacing: .02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sticker-label-week {
      font-family: 'Barlow Condensed', sans-serif; font-size: .44rem;
      color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: .07em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

    .sticker-label-country {
      display: flex; align-items: center; gap: .2rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .48rem;
      letter-spacing: .07em; text-transform: uppercase; color: var(--orange);
      margin-top: .1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Gradientes reales por país (tomados del Álbum FanSLA) ── */
    .band-do { background: linear-gradient(135deg,#002D62 0%,#CE1126 100%); }
    .band-sv { background: linear-gradient(135deg,#0F47AF 0%,#0F47AF 100%); }
    .band-gt { background: linear-gradient(135deg,#4997D0 0%,#1a5fa0 100%); }
    .band-hn { background: linear-gradient(135deg,#0073CF 0%,#00509a 100%); }
    .band-ni { background: linear-gradient(135deg,#3D6BE5 0%,#CE1126 100%); }
    .band-cr { background: linear-gradient(135deg,#002B7F 0%,#CE1126 100%); }
    .band-co { background: linear-gradient(135deg,#FCD116 0%,#003087 100%); }
    .band-pa { background: linear-gradient(135deg,#005293 0%,#D21034 100%); }
    .band-uy { background: linear-gradient(135deg,#75AADB 0%,#003087 100%); }

    .av-do { background: linear-gradient(135deg,#002D62,#111); }

    .av-hn { background: linear-gradient(135deg,#0073CF,#111); }

    .av-cr { background: linear-gradient(135deg,#002B7F,#CE1126); }
    .av-co { background: linear-gradient(135deg,#FCD116,#003087); }
    .av-pa { background: linear-gradient(135deg,#005293,#D21034); }
    .av-uy { background: linear-gradient(135deg,#75AADB,#222); }

    .country-page-do { background: linear-gradient(135deg,#002D62 0%,#1a3a80 50%,#CE1126 100%); }

    .country-page-gt { background: linear-gradient(135deg,#4997D0 0%,#1e6fa8 100%); }
    .country-page-hn { background: linear-gradient(135deg,#0073CF 0%,#005599 100%); }
    .country-page-ni { background: linear-gradient(135deg,#3D6BE5 0%,#CE1126 100%); }
    .country-page-cr { background: linear-gradient(135deg,#002B7F 0%,#CE1126 100%); }
    .country-page-co { background: linear-gradient(135deg,#FCD116 0%,#003087 100%); }
    .country-page-pa { background: linear-gradient(135deg,#005293 0%,#D21034 100%); }

    .page-cover-left, .page-end {

      text-align: center; padding: 2rem;
    }
    /* Collage de fotos de fondo (portada / contraportada) */
    .cover-collage {
      position: absolute; inset: 0; z-index: 0;
      display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr;
    }
    .cover-cell { overflow: hidden; }
    .cover-cell img { width: 100%; height: 100%; object-fit: cover; display: block; filter: saturate(1.15) contrast(1.05); }
    .cover-overlay {
      position: absolute; inset: 0; z-index: 1;
      background:
        radial-gradient(ellipse 85% 65% at 50% 50%, rgba(0,18,68,.5) 0%, rgba(0,12,50,.93) 78%),
        linear-gradient(180deg, rgba(0,10,40,.55) 0%, rgba(0,10,40,.7) 45%, rgba(0,10,40,.92) 100%);
    }
    .cover-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; gap: .7rem;
    }
    .cover-badge {
      font-family: 'Barlow Condensed', sans-serif; font-size: .6rem; font-weight: 700;
      letter-spacing: .25em; text-transform: uppercase; color: var(--orange);
      background: rgba(247,168,0,.15); border: 1px solid rgba(247,168,0,.45);
      border-radius: 20px; padding: .3rem 1rem;

    .cover-flags {

    .cover-divider {

      background: linear-gradient(90deg, transparent, var(--orange), transparent);

    .page-cover-left .cover-icon { font-size: 3rem; filter: drop-shadow(0 0 12px rgba(247,168,0,.4)); }
    .page-cover-left .cover-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.1rem; letter-spacing: .1em; color: var(--orange); line-height: 1;
      text-shadow: 3px 3px 0 rgba(0,0,0,.4);
    }
    .page-cover-left .cover-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,.7);
    }

    .page-cover-right {
      background: var(--page-bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; gap: 1rem;
    }
    .page-cover-right .cr-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .08em;
      color: var(--navy); line-height: 1;
    }
    .page-cover-right .cr-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(0,0,80,.4);
    }
    .page-cover-right .cr-stat {
      background: rgba(0,31,94,.06); border: 1.5px solid rgba(0,31,94,.12);
      border-radius: 10px; padding: .8rem 1.4rem;
      font-family: 'Barlow Condensed', sans-serif; letter-spacing: .06em;

      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--navy);
      display: block; line-height: 1;
    }
    .page-cover-right .cr-stat small {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: rgba(0,0,80,.4);
    }

    .page-section {
      position: relative; z-index: 1;
      background: linear-gradient(135deg, #001244 0%, #002080 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; gap: .7rem; height: 100%;
    }
    .page-section .sec-badge {
      font-family: 'Barlow Condensed', sans-serif; font-size: .62rem; font-weight: 700;
      letter-spacing: .3em; text-transform: uppercase; color: var(--orange);
      background: rgba(247,168,0,.12); border: 1px solid rgba(247,168,0,.35);
      border-radius: 20px; padding: .3rem 1rem;
    }
    .page-section .sec-icon {
      width: 76px; height: 76px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.25);
      box-shadow: 0 0 0 6px rgba(247,168,0,.08), 0 10px 30px rgba(0,0,0,.4);
    }
    .page-section .sec-divider {
      width: 60px; height: 3px; border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }
    .page-section .sec-region {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.1rem; letter-spacing: .1em;
      color: #fff; line-height: 1; text-shadow: 3px 3px 0 rgba(0,0,0,.35);
    }
    .page-section .sec-count {
      font-family: 'Barlow Condensed', sans-serif; font-size: .68rem; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: var(--orange);
      background: rgba(247,168,0,.1); border: 1.5px solid rgba(247,168,0,.35);
      border-radius: 20px; padding: .4rem 1.2rem;
    }

    .page-end .end-icon { font-size: 3rem; filter: drop-shadow(0 0 12px rgba(247,168,0,.4)); }
    .page-end .end-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .1em; color: var(--gold);
      text-shadow: 3px 3px 0 rgba(0,0,0,.4);
    }
    .page-end .end-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,.7);
    }

    /* ── NAVIGATION ── */
    .nav-bar {
      display: flex; align-items: center; gap: 1.5rem; margin-top: 1.4rem;
    }
    .nav-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.7);
      border: 1.5px solid rgba(255,255,255,.12); font-size: 1.1rem;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover:not(:disabled) { background: var(--orange); color: #000; border-color: var(--orange); }
    .nav-btn:disabled { opacity: .25; cursor: not-allowed; }
    .page-counter {
      font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(255,255,255,.45); text-align: center; min-width: 160px;
    }
    .page-counter strong { color: rgba(255,255,255,.8); }

    @media (max-width: 700px) {

    }
    @media (max-width: 400px) {
      .sticker-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── PROGRESS BAR ── */
    .progress-track {
      width: 100%; max-width: 1100px; height: 2px;
      background: rgba(255,255,255,.06); border-radius: 2px; margin-top: .8rem;
    }
    .progress-fill {
      height: 100%; background: var(--orange); border-radius: 2px; transition: width .4s ease;
    }

    .hidden { display: none !important; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: rgba(232,35,26,.9); color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .08em;

      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      z-index: 9999; animation: fadeInUp .3s ease;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  function flagSvg(code, w) {
    var width = w || 20, height = Math.round(width * 3 / 4);
    if (!FLAG_B64[code]) {
      return '<span style="display:inline-block;width:' + width + 'px;height:' + height + 'px;background:#666;border-radius:2px;vertical-align:middle;"></span>';
    }
    return '<img src="data:image/svg+xml;base64,' + FLAG_B64[code] + '" width="' + width + '" height="' + height + '" alt="" ' +
      'style="display:inline-block;object-fit:cover;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.4);vertical-align:middle;flex-shrink:0;">';
  }
  function flagImg(region, w) {
    var code = getIso(region);
    return flagSvg(code, w);
  }

  var ISO_CLASSES = ['do', 'sv', 'gt', 'hn', 'ni', 'cr', 'co', 'pa', 'uy'];
  function isoClass(region, prefix) {
    var code = getIso(region);
    return (code && ISO_CLASSES.indexOf(code) !== -1) ? (prefix + '-' + code) : (prefix + '-default');
  }

  var token  = localStorage.getItem('token');

    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function (r) {
    if (r.status === 401 || r.status === 403) { window.location.href = 'admin.html'; throw new Error('auth'); }
    return r.json();
  })
  .then(function (data) {
    document.getElementById('loading').style.display = 'none';

    if (!data.tiendas || data.tiendas.length === 0) {
      showToast('Aún no hay fotos en el álbum.');

      document.getElementById('statFotos').textContent = '0';
      document.getElementById('statTiendas').textContent = '0';

  });

    });
    function samplePhotos(count, offset) {
      if (!allFotos.length) return [];

        regionTotalFotos += fotos.length;
        fotos.forEach(function (f) { if (f.foto_url) regionFotoUrls.push(f.foto_url); });
      });

      // Region divider page pair
      pages.push({ type: 'section', region: region, count: tiendas.length, totalFotos: regionTotalFotos });
      pages.push({ type: 'blank', region: region, fotos: regionFotoUrls.slice(0, 12) });

      tiendas.forEach(function (tienda) {
        var fotos = tienda.fotos;
        if (!fotos || fotos.length === 0) return;

        // Slice photos into groups of FOTOS_POR_PAGINA
        for (var i = 0; i < fotos.length; i += FOTOS_POR_PAGINA) {
          var slice = fotos.slice(i, i + FOTOS_POR_PAGINA);
          slice.forEach(function (f) { globalNum++; f.numeroGlobal = globalNum; });
          pages.push({
            type: 'photos',
            tienda: tienda.nombre,
            region: tienda.region,
            codigo: tienda.codigo,
            fotos: slice,
            regionTotalFotos: regionTotalFotos,
            pageInTienda: Math.floor(i / FOTOS_POR_PAGINA) + 1,
            totalPagesInTienda: Math.ceil(fotos.length / FOTOS_POR_PAGINA),
          });
        }
      });
    });

    // Pad para que el contenido central empareje bien (la portada y la contraportada quedan solas, como tapas duras)
    if (pages.length % 2 === 0) pages.push({ type: 'blank-end', fotos: samplePhotos(12, 2) });

    // Contraportada — siempre la última página, sola
    pages.push({ type: 'end', total_fotos: data.total_fotos, total_tiendas: data.total_tiendas, fotos: samplePhotos(14, 5), paises: paisesList });
  }

  /* ── LIBRO (StPageFlip: curva de página real, una a una) ── */
  var pageFlip = null;

  function initBook() {
    var container = document.getElementById('bookContainer');
    container.innerHTML = pages.map(function (p, i) {
      var hard = (i === 0 || i === pages.length - 1) ? ' data-density="hard"' : '';
      return '<div class="pf-page ' + pageBgClass(p) + '"' + hard + '>' + renderPageContent(p, i + 1) + '</div>';
    }).join('');

    pageFlip = new St.PageFlip(container, {
      width: 480, height: 640,
      size: 'stretch',
      minWidth: 260, maxWidth: 620,
      minHeight: 360, maxHeight: 840,
      showCover: true,
      flippingTime: 800,
      maxShadowOpacity: 0.65,
      usePortrait: true,
      mobileScrollSupport: true,
    });
    pageFlip.loadFromHTML(container.querySelectorAll('.pf-page'));
    pageFlip.on('flip', function (e) { updateNavUI(e.data); });
    updateNavUI(pageFlip.getCurrentPageIndex());
  }

  function updateNavUI(idx) {
    var total = pages.length;
    document.getElementById('btnPrev').disabled = idx <= 0;
    document.getElementById('btnNext').disabled = idx >= total - 1;
    document.getElementById('pageCounter').innerHTML =
      '<strong>Página ' + (idx + 1) + '</strong> de ' + total;
    document.getElementById('progressFill').style.width =
      Math.round(((idx + 1) / total) * 100) + '%';
    document.getElementById('libroMeta').textContent =
      'Página ' + (idx + 1) + ' / ' + total;
  }

  function pageBgClass(page) {
    return (page.type === 'photos' || page.type === 'section') ? (isoClass(page.region, 'country-page') + ' page-premium-bg') : '';
  }

  function initials(name) {
    var parts = String(name || '').trim().split(/\s+/);
    var ini = (parts[0] ? parts[0][0] : '') + (parts[1] ? parts[1][0] : '');
    return ini.toUpperCase() || '?';
  }

  function collageHtml(fotos) {
    if (!fotos || !fotos.length) return '';
    return '<div class="cover-collage">' + fotos.map(function (url) {
      return '<div class="cover-cell"><img src="' + esc(url) + '" loading="lazy" alt="" ' +
        'onerror="this.parentElement.style.visibility=\'hidden\'"></div>';
    }).join('') + '</div>';
  }

  function flagsRowHtml(paises) {
    if (!paises || !paises.length) return '';
    return '<div class="cover-flags">' + paises.map(function (r) { return flagImg(r, 24); }).join('') + '</div>';
  }

  function renderPageContent(page, num) {
    if (page.type === 'cover-left') {
      return '<div class="page-cover-left">' +
        collageHtml(page.fotos) +
        '<div class="cover-overlay"></div>' +
        '<div class="cover-content">' +
        '<div class="cover-badge">⚽ Edición Especial · 9 Países</div>' +
        '<div class="cover-icon">🏆</div>' +
        '<div class="cover-title">Álbum<br>Conmemorativo</div>' +
        '<div class="cover-divider"></div>' +
        '<div class="cover-sub">Mundial CDT · Julio 2026</div>' +
        flagsRowHtml(page.paises) +
        '</div>' +
        '</div>';
    }
    if (page.type === 'cover-right') {
      return '<div class="page-cover-right">' +
        '<div class="cr-title">Bienvenidos al<br>Álbum del Mundial</div>' +
        '<div class="cr-sub">Recuerdo del cierre de la actividad</div>' +
        '<div class="cr-stat"><strong>' + page.total_fotos + '</strong><small>Fotografías de colaboradores</small></div>' +
        '<div class="cr-stat"><strong>' + page.total_tiendas + '</strong><small>Tiendas participantes</small></div>' +
        '</div>';
    }
    if (page.type === 'section') {
      return '<div class="page-section">' +
        '<div class="sec-badge">⚽ Álbum Conmemorativo</div>' +
        '<div class="sec-icon">' + flagImg(page.region, 40) + '</div>' +
        '<div class="sec-region">' + esc(page.region) + '</div>' +
        '<div class="sec-divider"></div>' +
        '<div class="sec-count">' + page.totalFotos + ' / ' + page.totalFotos + ' figuritas</div>' +
        '</div>';
    }
    if (page.type === 'end') {
      return '<div class="page-end">' +
        collageHtml(page.fotos) +
        '<div class="cover-overlay"></div>' +
        '<div class="cover-content">' +
        '<div class="cover-badge">🏁 Cierre de temporada</div>' +
        '<div class="end-icon">🏆</div>' +
        '<div class="end-title">¡Gracias a todos!</div>' +
        '<div class="cover-divider"></div>' +
        '<div class="end-sub">' + page.total_fotos + ' momentos capturados<br>en ' + page.total_tiendas + ' tiendas</div>' +
        flagsRowHtml(page.paises) +
        '</div>' +
        '</div>';
    }
    if (page.type === 'blank' || page.type === 'blank-end' || page.type === 'end-right') {
      var blankCollage = (page.fotos && page.fotos.length)
        ? '<div class="blank-collage">' + page.fotos.map(function (url) {
            return '<div class="cover-cell"><img src="' + esc(url) + '" loading="lazy" alt="" ' +
              'onerror="this.parentElement.style.visibility=\'hidden\'"></div>';
          }).join('') + '</div>'
        : '';
      return '<div class="blank-page">' + blankCollage + '<div class="page-num">· · ·</div></div>';
    }
    if (page.type === 'photos') {
      var tiendaLabel = esc(page.tienda);
      var subLabel = page.totalPagesInTienda > 1
        ? 'Pág. ' + page.pageInTienda + '/' + page.totalPagesInTienda
        : '';
      var bandCls = isoClass(page.region, 'band');
      var avCls = isoClass(page.region, 'av');
      var stickersHtml = page.fotos.map(function (f) {
        return '<div class="sticker">' +
          (f.esNueva ? '<div class="sticker-nueva">¡Nueva!</div>' : '') +
          '<div class="sticker-band ' + bandCls + '">' +
          '<span class="sticker-band-num">' + pad3(f.numeroGlobal) + '</span>' +
          flagImg(page.region, 20) +
          '</div>' +
          '<div class="sticker-num-watermark">' + f.numeroGlobal + '</div>' +
          '<div class="sticker-photo">' +
          '<img class="sticker-img" src="' + esc(f.foto_url) + '" loading="lazy" alt="" ' +
          'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
          '<div class="sticker-avatar ' + avCls + '" style="display:none">' + initials(page.tienda) + '</div>' +
          '</div>' +
          '<div class="sticker-info">' +
          '<div class="sticker-label-name">' + tiendaLabel + '</div>' +
          (f.semana_nombre ? '<div class="sticker-label-week">' + esc(f.semana_nombre) + '</div>' : '') +
          '<div class="sticker-label-country">' + flagImg(page.region, 20) + esc(page.region || '') + '</div>' +
          '</div>' +
          '</div>';
      }).join('');
      return '<div class="region-banner">' +
        '<div class="region-banner-flag">' + flagImg(page.region, 60) + '</div>' +
        '<div class="region-banner-text">' +
        '<div class="region-banner-title">' + esc(page.region || '') + '</div>' +
        '<div class="region-banner-sub">' + tiendaLabel + (subLabel ? ' · ' + subLabel : '') + '</div>' +
        '</div>' +
        '<div class="region-banner-count">' +
        '<span class="region-banner-count-num">' + page.regionTotalFotos + '</span>' +
        '<span class="region-banner-count-lbl">Figuritas</span>' +
        '</div>' +
        '</div>' +
        '<div class="sticker-grid">' + stickersHtml + '</div>';
    }
    return '';
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── NAVIGATION ── */
  function goPrev() { if (pageFlip) pageFlip.flipPrev(); }
  function goNext() { if (pageFlip) pageFlip.flipNext(); }
  document.getElementById('btnPrev').addEventListener('click', goPrev);
  document.getElementById('btnNext').addEventListener('click', goNext);

  /* ── FULLSCREEN ── */
  var btnFullscreen = document.getElementById('btnFullscreen');
  btnFullscreen.addEventListener('click', function () {
    if (!document.fullscreenElement) {
      document.getElementById('libro').requestFullscreen().catch(function () {});
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', function () {
    var icon = btnFullscreen.querySelector('i');
    if (document.fullscreenElement) {
      icon.className = 'fa-solid fa-compress';
      btnFullscreen.title = 'Salir de pantalla completa';
    } else {
      icon.className = 'fa-solid fa-expand';
      btnFullscreen.title = 'Pantalla completa';
    }
  });

  document.addEventListener('keydown', function (e) {
    if (document.getElementById('libro').style.display === 'none') return;
    if (e.key === 'ArrowLeft') goPrev();
    if (e.key === 'ArrowRight') goNext();
  });
  // El arrastre de esquina/página y el swipe táctil ya los maneja StPageFlip.

  /* ── OPEN / CLOSE BOOK ── */
  document.getElementById('btnAbrir').addEventListener('click', function () {
    if (pages.length === 0) return;
    var portada = document.getElementById('portada');
    portada.classList.add('saliendo');
    setTimeout(function () {
      portada.classList.add('hidden');
      portada.classList.remove('saliendo');
      document.getElementById('libro').classList.add('visible');
      if (!pageFlip) initBook();
    }, 600);
  });

  document.getElementById('btnVolver').addEventListener('click', function () {
    document.getElementById('libro').classList.remove('visible');
    document.getElementById('portada').classList.remove('hidden');
  });

  /* ── TOAST ── */
  function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 4000);
  }
})();
</script>
</body>
</html>
