<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Libro Conmemorativo · Mundial CDT 2026</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --navy:   #001f5e;
      --blue:   #0046AD;
      --orange: #F7A800;
      --red:    #E8231A;
      --gold:   #F7C800;
      --cream:  #fdf6e3;
      --page-bg:#f5edd8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: radial-gradient(ellipse at top, #001a55 0%, #000d2e 60%, #010812 100%);
      min-height: 100vh; overflow-x: hidden; color: #fff;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at top, #001a55 0%, #000a20 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
    }
    .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(247,168,0,.2);
      border-top-color: var(--orange); border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.5); }

    /* ── PORTADA ── */
    #portada {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #002080 0%, #000c28 70%);
      overflow: hidden; transition: opacity .6s ease, transform .6s ease;
    }
    #portada.saliendo { opacity: 0; transform: scale(1.06); pointer-events: none; }

    .portada-estrellas {
      position: absolute; inset: 0; overflow: hidden; pointer-events: none;
    }
    .portada-estrellas::before, .portada-estrellas::after {
      content: '';
      position: absolute; border-radius: 50%; opacity: .08;
    }
    .portada-estrellas::before {
      width: 600px; height: 600px; top: -200px; left: -150px;
      background: radial-gradient(circle, var(--orange) 0%, transparent 70%);
    }
    .portada-estrellas::after {
      width: 500px; height: 500px; bottom: -150px; right: -100px;
      background: radial-gradient(circle, var(--blue) 0%, transparent 70%);
    }

    .portada-badge {
      font-family: 'Barlow Condensed', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: .25em; text-transform: uppercase;
      background: rgba(247,168,0,.12); color: var(--orange);
      border: 1px solid rgba(247,168,0,.3); border-radius: 20px;
      padding: .35rem 1.1rem; margin-bottom: 1.2rem;
    }
    .portada-icon { font-size: 3.5rem; margin-bottom: .8rem; filter: drop-shadow(0 0 20px rgba(247,168,0,.5)); }
    .portada-title {
      font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: .08em; line-height: .9; text-align: center;
      background: linear-gradient(135deg, #fff 20%, var(--gold) 60%, var(--orange) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,.5));
      margin-bottom: .4rem;
    }
    .portada-subtitle {
      font-family: 'Barlow Condensed', sans-serif; font-size: clamp(.85rem, 2.5vw, 1.1rem);
      font-weight: 400; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(255,255,255,.5); margin-bottom: 2.5rem; text-align: center;
    }
    .portada-divider {
      width: 80px; height: 3px; margin: 0 auto 2rem;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }
    .btn-abrir {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      background: linear-gradient(135deg, var(--orange) 0%, #e08900 100%);
      color: #000; border: none; border-radius: 30px;
      padding: .85rem 2.4rem; cursor: pointer;
      box-shadow: 0 8px 32px rgba(247,168,0,.4);
      transition: all .25s; position: relative; overflow: hidden;
    }
    .btn-abrir::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.25), transparent);
      border-radius: 30px;
    }
    .btn-abrir:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(247,168,0,.55); }
    .btn-abrir:active { transform: translateY(0); }
    .portada-stats {
      display: flex; gap: 2.5rem; margin-top: 2rem;
    }
    .portada-stat {
      text-align: center;
    }
    .portada-stat-num {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .05em;
      color: var(--orange); display: block; line-height: 1;
    }
    .portada-stat-lbl {
      font-family: 'Barlow Condensed', sans-serif; font-size: .62rem; letter-spacing: .15em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
    }

    /* ── LIBRO ── */
    #libro { display: none; flex-direction: column; align-items: center; min-height: 100vh; padding: 1.5rem 1rem 5rem; }
    #libro.visible { display: flex; }

    .libro-header {
      width: 100%; max-width: 1100px;
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .btn-back {
      font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      background: rgba(255,255,255,.07); color: rgba(255,255,255,.6);
      border: 1px solid rgba(255,255,255,.12); border-radius: 20px;
      padding: .4rem 1rem; cursor: pointer; transition: all .2s;
      display: flex; align-items: center; gap: .4rem;
    }
    .btn-back:hover { background: rgba(255,255,255,.12); color: #fff; }
    .libro-header-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: .1em;
      flex: 1;
    }
    .libro-header-title span { color: var(--orange); }
    .libro-meta {
      font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; letter-spacing: .1em;
      text-transform: uppercase; color: rgba(255,255,255,.35);
    }

    /* ── SPREAD (book open view) ── */
    .spread-wrap {
      width: 100%; max-width: 1100px;
      background: #1a2540;
      border-radius: 12px;
      box-shadow: 0 20px 80px rgba(0,0,0,.7);
      overflow: hidden;
      position: relative;
    }

    .spread {
      display: grid;
      grid-template-columns: 1fr 3px 1fr;
      min-height: 520px;
    }
    .spine {
      background: linear-gradient(180deg, #0a1428 0%, #1a2540 50%, #0a1428 100%);
      box-shadow: -3px 0 8px rgba(0,0,0,.5), 3px 0 8px rgba(0,0,0,.5);
    }
    .page {
      background: var(--page-bg);
      padding: 1.4rem 1.2rem 1.2rem;
      position: relative; min-height: 520px;
      display: flex; flex-direction: column;
    }
    .page::after {
      content: '';
      position: absolute; top: 0; bottom: 0; right: 0; width: 6px;
      background: linear-gradient(90deg, transparent, rgba(0,0,0,.06));
      pointer-events: none;
    }
    .page:last-child::after { display: none; }
    .page-num {
      font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(0,0,0,.3);
      text-align: center; margin-bottom: .7rem;
    }
    /* ── REGION HEADER (estilo section-header de FanSLA) ── */
    .region-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem;
    }
    .region-header-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1;
      color: #fff; text-shadow: 2px 2px 0 rgba(0,0,0,.3);
      display: flex; align-items: center; gap: .5rem;
    }
    .region-header-title img { width: 22px; height: auto; border-radius: 2px; }
    .region-header-pill {
      font-family: 'Barlow Condensed', sans-serif; font-size: .62rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: #fff;
      background: rgba(255,255,255,.2); border: 2px solid rgba(255,255,255,.4);
      border-radius: 20px; padding: .25rem .75rem; white-space: nowrap;
    }
    .region-header-sub {
      width: 100%;
      font-family: 'Barlow Condensed', sans-serif; font-size: .65rem; letter-spacing: .1em;
      text-transform: uppercase; color: rgba(255,255,255,.5);
    }

    /* ── FIGURITA GRID (estilo sticker de FanSLA) ── */
    .sticker-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .6rem;
      flex: 1;
      align-content: start;
    }
    .sticker {
      position: relative;
      aspect-ratio: 9 / 13;
      border-radius: 10px;
      overflow: hidden;
      display: flex; flex-direction: column;
      background: #fff; border: 3px solid #fff;
      box-shadow: 4px 6px 20px rgba(0,0,0,.45);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
      cursor: default;
    }
    .sticker:hover { transform: translateY(-5px) scale(1.03) rotate(-1deg); box-shadow: 0 14px 32px rgba(0,0,0,.5); z-index: 2; }
    .sticker-band {
      height: 22px; width: 100%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 6px; position: relative; z-index: 3;
    }
    .sticker-band-num {
      background: rgba(0,0,0,.35); color: #fff;
      font-family: 'Bebas Neue', sans-serif; font-size: .6rem;
      padding: 1px 5px; border-radius: 4px; letter-spacing: .05em;
    }
    .sticker-band img { width: 14px; height: auto; border-radius: 2px; display: block; }
    .sticker-num-watermark {
      position: absolute; right: -4px; top: 16px;
      font-family: 'Bebas Neue', sans-serif; font-size: 3.6rem; line-height: 1;
      color: rgba(0,0,0,.07); z-index: 0; pointer-events: none; user-select: none;
    }
    .sticker-photo {
      height: 58%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; z-index: 1;
      background: linear-gradient(180deg, #c8daf5 0%, #e8f0fb 100%);
    }
    .sticker-img {
      width: 100%; height: 100%; object-fit: cover; object-position: center;
      position: absolute; inset: 0; z-index: 1;
    }
    .sticker-avatar {
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px solid rgba(0,70,173,.3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--blue);
      background: #fff; position: relative; z-index: 1;
    }
    .sticker-nueva {
      position: absolute; top: 26px; left: 5px; z-index: 10;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: .44rem;
      letter-spacing: .1em; text-transform: uppercase; color: #fff;
      background: var(--red); border-radius: 3px; padding: .1rem .3rem;
    }
    .sticker-info {
      background: #0d2460;
      padding: .3rem .4rem .3rem;
      flex: 1; display: flex; flex-direction: column; justify-content: center; gap: .05rem;
      position: relative; z-index: 3;
      border-top: 3px solid var(--orange);
    }
    .sticker-label-name {
      font-family: 'Bebas Neue', sans-serif; font-size: .68rem; line-height: 1.1;
      color: #fff; text-transform: uppercase; letter-spacing: .02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sticker-label-week {
      font-family: 'Barlow Condensed', sans-serif; font-size: .44rem;
      color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: .07em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sticker-label-country {
      display: flex; align-items: center; gap: .2rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: .48rem;
      letter-spacing: .07em; text-transform: uppercase; color: var(--orange);
      margin-top: .1rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sticker-label-country img { width: 10px; height: auto; border-radius: 1px; flex-shrink: 0; }

    /* ── Gradientes reales por país (tomados del Álbum FanSLA) ── */
    .band-do { background: linear-gradient(135deg,#002D62 0%,#CE1126 100%); }
    .band-sv { background: linear-gradient(135deg,#0F47AF 0%,#0F47AF 100%); }
    .band-gt { background: linear-gradient(135deg,#4997D0 0%,#1a5fa0 100%); }
    .band-hn { background: linear-gradient(135deg,#0073CF 0%,#00509a 100%); }
    .band-ni { background: linear-gradient(135deg,#3D6BE5 0%,#CE1126 100%); }
    .band-cr { background: linear-gradient(135deg,#002B7F 0%,#CE1126 100%); }
    .band-co { background: linear-gradient(135deg,#FCD116 0%,#003087 100%); }
    .band-pa { background: linear-gradient(135deg,#005293 0%,#D21034 100%); }
    .band-uy { background: linear-gradient(135deg,#75AADB 0%,#003087 100%); }
    .band-default { background: linear-gradient(90deg, var(--navy) 0%, var(--blue) 100%); }

    .av-do { background: linear-gradient(135deg,#002D62,#111); }
    .av-sv { background: linear-gradient(135deg,#0F47AF,#111); }
    .av-gt { background: linear-gradient(135deg,#4997D0,#111); }
    .av-hn { background: linear-gradient(135deg,#0073CF,#111); }
    .av-ni { background: linear-gradient(135deg,#3D6BE5,#CE1126); }
    .av-cr { background: linear-gradient(135deg,#002B7F,#CE1126); }
    .av-co { background: linear-gradient(135deg,#FCD116,#003087); }
    .av-pa { background: linear-gradient(135deg,#005293,#D21034); }
    .av-uy { background: linear-gradient(135deg,#75AADB,#222); }

    .country-page-do { background: linear-gradient(135deg,#002D62 0%,#1a3a80 50%,#CE1126 100%); }
    .country-page-sv { background: linear-gradient(135deg,#0F47AF 0%,#1260cc 100%); }
    .country-page-gt { background: linear-gradient(135deg,#4997D0 0%,#1e6fa8 100%); }
    .country-page-hn { background: linear-gradient(135deg,#0073CF 0%,#005599 100%); }
    .country-page-ni { background: linear-gradient(135deg,#3D6BE5 0%,#CE1126 100%); }
    .country-page-cr { background: linear-gradient(135deg,#002B7F 0%,#CE1126 100%); }
    .country-page-co { background: linear-gradient(135deg,#FCD116 0%,#003087 100%); }
    .country-page-pa { background: linear-gradient(135deg,#005293 0%,#D21034 100%); }
    .country-page-uy { background: linear-gradient(135deg,#003087 0%,#75AADB 100%); }
    .country-page-default { background: linear-gradient(150deg,#0a2d6e 0%,#1c5fc4 100%); }

    /* ── SPECIAL PAGES ── */
    .page-cover-left {
      background: linear-gradient(135deg, var(--navy) 0%, #001244 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: .8rem; padding: 2rem;
    }
    .page-cover-left .cover-icon { font-size: 3rem; filter: drop-shadow(0 0 12px rgba(247,168,0,.4)); }
    .page-cover-left .cover-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .1em; color: var(--orange); line-height: 1;
    }
    .page-cover-left .cover-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,.45);
    }
    .page-cover-left .cover-divider {
      width: 50px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }

    .page-cover-right {
      background: var(--page-bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; gap: 1rem;
    }
    .page-cover-right .cr-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .08em;
      color: var(--navy); line-height: 1;
    }
    .page-cover-right .cr-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(0,0,80,.4);
    }
    .page-cover-right .cr-stat {
      background: rgba(0,31,94,.06); border: 1.5px solid rgba(0,31,94,.12);
      border-radius: 10px; padding: .8rem 1.4rem;
      font-family: 'Barlow Condensed', sans-serif; letter-spacing: .06em;
    }
    .page-cover-right .cr-stat strong {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--navy);
      display: block; line-height: 1;
    }
    .page-cover-right .cr-stat small {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: rgba(0,0,80,.4);
    }

    .page-section {
      background: linear-gradient(135deg, #001244 0%, #002080 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; gap: .8rem;
    }
    .page-section .sec-icon { font-size: 2.4rem; opacity: .85; }
    .page-section .sec-icon img { width: 60px; height: auto; border-radius: 5px; box-shadow: 0 4px 14px rgba(0,0,0,.35); }
    .page-section .sec-region {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: .15em;
      color: var(--orange);
    }
    .page-section .sec-count {
      font-family: 'Barlow Condensed', sans-serif; font-size: .72rem; letter-spacing: .15em;
      text-transform: uppercase; color: rgba(255,255,255,.4);
    }

    .page-end {
      background: linear-gradient(135deg, #001244 0%, #002080 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; gap: .8rem;
    }
    .page-end .end-icon { font-size: 3rem; filter: drop-shadow(0 0 12px rgba(247,168,0,.4)); }
    .page-end .end-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: .1em; color: var(--gold);
    }
    .page-end .end-sub {
      font-family: 'Barlow Condensed', sans-serif; font-size: .75rem; letter-spacing: .18em;
      text-transform: uppercase; color: rgba(255,255,255,.4);
    }

    /* ── NAVIGATION ── */
    .nav-bar {
      display: flex; align-items: center; gap: 1.5rem; margin-top: 1.4rem;
    }
    .nav-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.08); color: rgba(255,255,255,.7);
      border: 1.5px solid rgba(255,255,255,.12); font-size: 1.1rem;
      cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btn:hover:not(:disabled) { background: var(--orange); color: #000; border-color: var(--orange); }
    .nav-btn:disabled { opacity: .25; cursor: not-allowed; }
    .page-counter {
      font-family: 'Barlow Condensed', sans-serif; font-size: .78rem; letter-spacing: .12em;
      text-transform: uppercase; color: rgba(255,255,255,.45); text-align: center; min-width: 160px;
    }
    .page-counter strong { color: rgba(255,255,255,.8); }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      .spread { grid-template-columns: 1fr; }
      .page-right { display: none; }
      .spine { display: none; }
      .page { min-height: 400px; }
      .sticker-grid { grid-template-columns: repeat(3, 1fr); gap: .5rem; }
      .libro-header-title { font-size: 1.1rem; }
    }
    @media (max-width: 400px) {
      .sticker-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── PROGRESS BAR ── */
    .progress-track {
      width: 100%; max-width: 1100px; height: 2px;
      background: rgba(255,255,255,.06); border-radius: 2px; margin-top: .8rem;
    }
    .progress-fill {
      height: 100%; background: var(--orange); border-radius: 2px; transition: width .4s ease;
    }

    .hidden { display: none !important; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
      background: rgba(232,35,26,.9); color: #fff;
      font-family: 'Barlow Condensed', sans-serif; font-size: .9rem; letter-spacing: .08em;
      padding: .7rem 1.5rem; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      z-index: 9999; animation: fadeInUp .3s ease;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Cargando álbum conmemorativo...</p>
</div>

<!-- PORTADA -->
<div id="portada" class="hidden">
  <div class="portada-estrellas"></div>
  <span class="portada-badge"><i class="fa-solid fa-shield-halved"></i> &nbsp; Solo administradores</span>
  <div class="portada-icon">⚽</div>
  <h1 class="portada-title">Álbum<br>Conmemorativo</h1>
  <p class="portada-subtitle">Mundial CDT · Julio 2026</p>
  <div class="portada-divider"></div>
  <button class="btn-abrir" id="btnAbrir">
    <i class="fa-solid fa-book-open"></i> &nbsp; Abrir Álbum
  </button>
  <div class="portada-stats" id="portadaStats">
    <div class="portada-stat">
      <span class="portada-stat-num" id="statFotos">—</span>
      <span class="portada-stat-lbl">Fotografías</span>
    </div>
    <div class="portada-stat">
      <span class="portada-stat-num" id="statTiendas">—</span>
      <span class="portada-stat-lbl">Tiendas</span>
    </div>
    <div class="portada-stat">
      <span class="portada-stat-num" id="statPaginas">—</span>
      <span class="portada-stat-lbl">Páginas</span>
    </div>
  </div>
</div>

<!-- LIBRO -->
<div id="libro">
  <div class="libro-header">
    <button class="btn-back" id="btnVolver"><i class="fa-solid fa-arrow-left"></i> Portada</button>
    <div class="libro-header-title">Álbum <span>Conmemorativo</span> · Mundial CDT 2026</div>
    <div class="libro-meta" id="libroMeta"></div>
  </div>

  <div class="spread-wrap">
    <div class="spread" id="spread">
      <!-- pages injected by JS -->
    </div>
  </div>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="btnPrev" disabled title="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="page-counter" id="pageCounter">—</div>
    <button class="nav-btn" id="btnNext" title="Siguiente"><i class="fa-solid fa-chevron-right"></i></button>
    <button class="nav-btn" id="btnFullscreen" title="Pantalla completa"><i class="fa-solid fa-expand"></i></button>
  </div>
</div>

<script>
(function () {
  var API = 'https://album-cdt-mundial.onrender.com/api';
  var FOTOS_POR_PAGINA = 6;
  var isMobile = window.innerWidth <= 700;

  /* ── FLAGS (país por región) ── */
  var ISO_MAP = [
    ['costa rica','cr'],['el salvador','sv'],['guatemala','gt'],
    ['honduras','hn'],['nicaragua','ni'],['panama','pa'],['panamá','pa'],
    ['domini','do'],['repúbli','do'],['urugu','uy'],['colombia','co'],
    ['perú','pe'],['peru','pe'],['chile','cl'],['méxico','mx'],['mexico','mx'],
    ['argentina','ar'],['bolivia','bo'],['ecuador','ec'],['venezuela','ve'],
  ];
  function getIso(region) {
    var r = (region + '').toLowerCase().trim();
    for (var i = 0; i < ISO_MAP.length; i++) {
      if (r.indexOf(ISO_MAP[i][0]) !== -1) return ISO_MAP[i][1];
    }
    return null;
  }
  function flagImg(region, w) {
    var code = getIso(region);
    if (!code) return '<i class="fa-solid fa-globe" style="font-size:.7rem;color:rgba(255,255,255,.35);"></i>';
    return '<img src="https://flagcdn.com/w' + (w || 20) + '/' + code + '.png" alt="' + code + '">';
  }

  /* ── Clases de país (gradientes reales estilo Álbum FanSLA, con ISO_MAP) ── */
  var ISO_CLASSES = ['do', 'sv', 'gt', 'hn', 'ni', 'cr', 'co', 'pa', 'uy'];
  function isoClass(region, prefix) {
    var code = getIso(region);
    return (code && ISO_CLASSES.indexOf(code) !== -1) ? (prefix + '-' + code) : (prefix + '-default');
  }

  function pad3(n) { n = String(n); return n.length >= 3 ? n : ('000' + n).slice(-3); }

  /* ── AUTH CHECK ── */
  var token  = localStorage.getItem('token');
  var esAdmin = localStorage.getItem('esAdmin') === 'true';
  if (!token || !esAdmin) {
    window.location.href = 'admin.html';
    return;
  }

  var pages = [];       // array of page descriptors
  var currentSpread = 0; // index into pages (left page index, right = index+1 on desktop)
  var totalSpreads = 0;

  /* ── FETCH DATA ── */
  fetch(API + '/album/libro', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function (r) {
    if (r.status === 401 || r.status === 403) { window.location.href = 'admin.html'; throw new Error('auth'); }
    return r.json();
  })
  .then(function (data) {
    document.getElementById('loading').style.display = 'none';

    if (!data.tiendas || data.tiendas.length === 0) {
      showToast('Aún no hay fotos en el álbum.');
      document.getElementById('portada').classList.remove('hidden');
      document.getElementById('statFotos').textContent = '0';
      document.getElementById('statTiendas').textContent = '0';
      document.getElementById('statPaginas').textContent = '0';
      return;
    }

    buildPages(data);

    document.getElementById('statFotos').textContent = data.total_fotos;
    document.getElementById('statTiendas').textContent = data.total_tiendas;
    document.getElementById('statPaginas').textContent = pages.length;
    document.getElementById('portada').classList.remove('hidden');
  })
  .catch(function (err) {
    if (err.message !== 'auth') {
      document.getElementById('loading').style.display = 'none';
      showToast('Error al cargar el álbum. Intente de nuevo.');
      document.getElementById('portada').classList.remove('hidden');
    }
  });

  /* ── BUILD PAGES ARRAY ── */
  function buildPages(data) {
    pages = [];

    // Page 0-1: portada interior (cover spread)
    pages.push({ type: 'cover-left' });
    pages.push({ type: 'cover-right', total_fotos: data.total_fotos, total_tiendas: data.total_tiendas });

    // Group tiendas by region
    var regions = {};
    data.tiendas.forEach(function (t) {
      var r = t.region || 'General';
      if (!regions[r]) regions[r] = [];
      regions[r].push(t);
    });

    var regionNames = Object.keys(regions).sort();
    var globalNum = 0;

    regionNames.forEach(function (region, regionIdx) {
      var tiendas = regions[region];

      // Orden cronológico por semana dentro de cada tienda + marca de "más reciente"
      var regionTotalFotos = 0;
      tiendas.forEach(function (tienda) {
        var fotos = tienda.fotos || [];
        fotos.sort(function (a, b) { return (a.semana_numero || 0) - (b.semana_numero || 0); });
        if (fotos.length) fotos[fotos.length - 1].esNueva = true;
        regionTotalFotos += fotos.length;
      });

      // Region divider page pair
      pages.push({ type: 'section', region: region, count: tiendas.length, totalFotos: regionTotalFotos });
      pages.push({ type: 'blank', region: region });

      tiendas.forEach(function (tienda) {
        var fotos = tienda.fotos;
        if (!fotos || fotos.length === 0) return;

        // Slice photos into groups of FOTOS_POR_PAGINA
        for (var i = 0; i < fotos.length; i += FOTOS_POR_PAGINA) {
          var slice = fotos.slice(i, i + FOTOS_POR_PAGINA);
          slice.forEach(function (f) { globalNum++; f.numeroGlobal = globalNum; });
          pages.push({
            type: 'photos',
            tienda: tienda.nombre,
            region: tienda.region,
            codigo: tienda.codigo,
            fotos: slice,
            regionTotalFotos: regionTotalFotos,
            pageInTienda: Math.floor(i / FOTOS_POR_PAGINA) + 1,
            totalPagesInTienda: Math.ceil(fotos.length / FOTOS_POR_PAGINA),
          });
        }
      });
    });

    // End page
    pages.push({ type: 'end', total_fotos: data.total_fotos, total_tiendas: data.total_tiendas });
    pages.push({ type: 'end-right' });

    // Pad to even number for spread view
    if (pages.length % 2 !== 0) pages.push({ type: 'blank-end' });

    totalSpreads = Math.ceil(pages.length / 2);
    currentSpread = 0;
  }

  /* ── RENDER SPREAD ── */
  function renderSpread() {
    var leftIdx  = currentSpread * 2;
    var rightIdx = leftIdx + 1;
    var leftPage  = pages[leftIdx]  || { type: 'blank-end' };
    var rightPage = pages[rightIdx] || { type: 'blank-end' };

    var spread = document.getElementById('spread');
    spread.innerHTML =
      '<div class="page page-left ' + pageBgClass(leftPage) + '">'  + renderPageContent(leftPage,  leftIdx + 1)  + '</div>' +
      '<div class="spine"></div>' +
      '<div class="page page-right ' + pageBgClass(rightPage) + '">' + renderPageContent(rightPage, rightIdx + 1) + '</div>';

    // Update nav
    document.getElementById('btnPrev').disabled = currentSpread === 0;
    document.getElementById('btnNext').disabled = currentSpread >= totalSpreads - 1;

    var pageNum = leftIdx + 1;
    document.getElementById('pageCounter').innerHTML =
      '<strong>Páginas ' + pageNum + '–' + (pageNum + 1) + '</strong> de ' + pages.length;
    document.getElementById('progressFill').style.width =
      Math.round(((currentSpread + 1) / totalSpreads) * 100) + '%';

    document.getElementById('libroMeta').textContent =
      'Spread ' + (currentSpread + 1) + ' / ' + totalSpreads;
  }

  function pageBgClass(page) {
    return (page.type === 'photos' || page.type === 'section') ? isoClass(page.region, 'country-page') : '';
  }

  function initials(name) {
    var parts = String(name || '').trim().split(/\s+/);
    var ini = (parts[0] ? parts[0][0] : '') + (parts[1] ? parts[1][0] : '');
    return ini.toUpperCase() || '?';
  }

  function renderPageContent(page, num) {
    if (page.type === 'cover-left') {
      return '<div class="page-cover-left">' +
        '<div class="cover-icon">⚽</div>' +
        '<div class="cover-title">Álbum<br>Conmemorativo</div>' +
        '<div class="cover-divider"></div>' +
        '<div class="cover-sub">Mundial CDT<br>Julio 2026</div>' +
        '</div>';
    }
    if (page.type === 'cover-right') {
      return '<div class="page-cover-right">' +
        '<div class="cr-title">Bienvenidos al<br>Álbum del Mundial</div>' +
        '<div class="cr-sub">Recuerdo del cierre de la actividad</div>' +
        '<div class="cr-stat"><strong>' + page.total_fotos + '</strong><small>Fotografías de colaboradores</small></div>' +
        '<div class="cr-stat"><strong>' + page.total_tiendas + '</strong><small>Tiendas participantes</small></div>' +
        '</div>';
    }
    if (page.type === 'section') {
      return '<div class="page-section">' +
        '<div class="sec-icon">' + flagImg(page.region, 60) + '</div>' +
        '<div class="sec-region">' + esc(page.region) + '</div>' +
        '<div class="sec-count">' + page.totalFotos + ' / ' + page.totalFotos + ' figuritas</div>' +
        '</div>';
    }
    if (page.type === 'end') {
      return '<div class="page-end">' +
        '<div class="end-icon">🏆</div>' +
        '<div class="end-title">¡Gracias a todos!</div>' +
        '<div class="end-sub">' + page.total_fotos + ' momentos capturados<br>en ' + page.total_tiendas + ' tiendas</div>' +
        '</div>';
    }
    if (page.type === 'blank' || page.type === 'blank-end' || page.type === 'end-right') {
      return '<div class="page-num">· · ·</div>';
    }
    if (page.type === 'photos') {
      var tiendaLabel = esc(page.tienda);
      var subLabel = page.totalPagesInTienda > 1
        ? 'Pág. ' + page.pageInTienda + '/' + page.totalPagesInTienda
        : '';
      var bandCls = isoClass(page.region, 'band');
      var avCls = isoClass(page.region, 'av');
      var stickersHtml = page.fotos.map(function (f) {
        return '<div class="sticker">' +
          (f.esNueva ? '<div class="sticker-nueva">¡Nueva!</div>' : '') +
          '<div class="sticker-band ' + bandCls + '">' +
          '<span class="sticker-band-num">' + pad3(f.numeroGlobal) + '</span>' +
          flagImg(page.region, 20) +
          '</div>' +
          '<div class="sticker-num-watermark">' + f.numeroGlobal + '</div>' +
          '<div class="sticker-photo">' +
          '<img class="sticker-img" src="' + esc(f.foto_url) + '" loading="lazy" alt="" ' +
          'onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
          '<div class="sticker-avatar ' + avCls + '" style="display:none">' + initials(page.tienda) + '</div>' +
          '</div>' +
          '<div class="sticker-info">' +
          '<div class="sticker-label-name">' + tiendaLabel + '</div>' +
          (f.semana_nombre ? '<div class="sticker-label-week">' + esc(f.semana_nombre) + '</div>' : '') +
          '<div class="sticker-label-country">' + flagImg(page.region, 20) + esc(page.region || '') + '</div>' +
          '</div>' +
          '</div>';
      }).join('');
      return '<div class="region-header">' +
        '<span class="region-header-title">' + flagImg(page.region, 30) + esc(page.region || '') + '</span>' +
        '<span class="region-header-pill">' + page.regionTotalFotos + ' / ' + page.regionTotalFotos + ' figuritas</span>' +
        '<span class="region-header-sub">' + tiendaLabel + (subLabel ? ' · ' + subLabel : '') + '</span>' +
        '</div>' +
        '<div class="sticker-grid">' + stickersHtml + '</div>';
    }
    return '';
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── NAVIGATION ── */
  document.getElementById('btnPrev').addEventListener('click', function () {
    if (currentSpread > 0) { currentSpread--; renderSpread(); }
  });
  document.getElementById('btnNext').addEventListener('click', function () {
    if (currentSpread < totalSpreads - 1) { currentSpread++; renderSpread(); }
  });

  /* ── FULLSCREEN ── */
  var btnFullscreen = document.getElementById('btnFullscreen');
  btnFullscreen.addEventListener('click', function () {
    if (!document.fullscreenElement) {
      document.getElementById('libro').requestFullscreen().catch(function () {});
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', function () {
    var icon = btnFullscreen.querySelector('i');
    if (document.fullscreenElement) {
      icon.className = 'fa-solid fa-compress';
      btnFullscreen.title = 'Salir de pantalla completa';
    } else {
      icon.className = 'fa-solid fa-expand';
      btnFullscreen.title = 'Pantalla completa';
    }
  });

  document.addEventListener('keydown', function (e) {
    if (document.getElementById('libro').style.display === 'none') return;
    if (e.key === 'ArrowLeft' && currentSpread > 0) { currentSpread--; renderSpread(); }
    if (e.key === 'ArrowRight' && currentSpread < totalSpreads - 1) { currentSpread++; renderSpread(); }
  });

  // Touch swipe
  var touchStartX = 0;
  document.getElementById('spread').addEventListener('touchstart', function (e) {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.getElementById('spread').addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0 && currentSpread < totalSpreads - 1) { currentSpread++; renderSpread(); }
      if (dx > 0 && currentSpread > 0) { currentSpread--; renderSpread(); }
    }
  }, { passive: true });

  /* ── OPEN / CLOSE BOOK ── */
  document.getElementById('btnAbrir').addEventListener('click', function () {
    if (pages.length === 0) return;
    var portada = document.getElementById('portada');
    portada.classList.add('saliendo');
    setTimeout(function () {
      portada.classList.add('hidden');
      portada.classList.remove('saliendo');
      document.getElementById('libro').classList.add('visible');
      currentSpread = 0;
      renderSpread();
    }, 600);
  });

  document.getElementById('btnVolver').addEventListener('click', function () {
    document.getElementById('libro').classList.remove('visible');
    document.getElementById('portada').classList.remove('hidden');
  });

  /* ── TOAST ── */
  function showToast(msg) {
    var t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function () { t.remove(); }, 4000);
  }
})();
</script>
</body>
</html>
